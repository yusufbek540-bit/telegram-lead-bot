    // Routing Rules Manager
    function RoutingRulesManager({ showToast }) {
      const [rules, setRules] = useState([]);
      const [ruleName, setRuleName] = useState('');
      const [ruleSourceCond, setRuleSourceCond] = useState('');
      const [ruleStrategy, setRuleStrategy] = useState('round_robin');
      
      const loadRules = useCallback(async () => {
        const { data } = await supabase.from('routing_rules').select('*').order('priority', { ascending: false });
        setRules(data || []);
      }, []);

      useEffect(() => { loadRules(); }, [loadRules]);

      const addRule = async () => {
        if (!ruleName.trim()) { showToast('Name required', 'error'); return; }
        const conditions = ruleSourceCond ? { source: ruleSourceCond.trim() } : {};
        const { error } = await supabase.from('routing_rules').insert({
          name: ruleName.trim(),
          conditions,
          assignee_strategy: ruleStrategy,
          priority: rules.length > 0 ? rules[0].priority + 1 : 1
        });
        if (error) { showToast(error.message, 'error'); return; }
        showToast('Rule added', 'success');
        setRuleName(''); setRuleSourceCond(''); setRuleStrategy('round_robin');
        loadRules();
      };

      const removeRule = async (id) => {
        await supabase.from('routing_rules').delete().eq('id', id);
        loadRules();
      };

      return (
        <div>
          <p style={{ fontSize: 13, color: '#64748b', marginBottom: 12 }}>New leads will be assigned based on these rules (highest priority down).</p>
          {rules.length > 0 ? (
            <div style={{ border: '1px solid #e2e8f0', borderRadius: 6, marginBottom: 12 }}>
              {rules.map(r => (
                <div key={r.id} style={{ display: 'flex', alignItems: 'center', gap: 12, padding: '8px 12px', borderBottom: '1px solid #e2e8f0' }}>
                  <span style={{ fontWeight: 500, flex: 1 }}>{r.name}</span>
                  <span style={{ fontSize: 13, background: '#f5f5f5', padding: '2px 6px', borderRadius: 4 }}>
                    {Object.keys(r.conditions||{}).length ? JSON.stringify(r.conditions) : 'All Sources'}
                  </span>
                  <span style={{ fontSize: 13, background: '#e0e7ff', color: '#3730a3', padding: '2px 6px', borderRadius: 4 }}>
                    {r.assignee_strategy}
                  </span>
                  <button className="btn" style={{ padding: '2px 8px' }} onClick={() => removeRule(r.id)}>✕</button>
                </div>
              ))}
            </div>
          ) : (
            <div style={{ color: '#64748b', fontSize: 13, marginBottom: 12 }}>No routing rules configured. Leads will fall back to baseline round-robin.</div>
          )}
          <div style={{ display: 'flex', gap: 8, alignItems: 'center', flexWrap: 'wrap' }}>
            <input placeholder="Name (e.g. Meta Ads)" value={ruleName} onChange={e => setRuleName(e.target.value)} style={{ flex: 1, minWidth: 150, padding: 8, border: '1px solid #e2e8f0', borderRadius: 6 }} />
            <input placeholder="Source direct match (optional)" value={ruleSourceCond} onChange={e => setRuleSourceCond(e.target.value)} style={{ flex: 1, minWidth: 150, padding: 8, border: '1px solid #e2e8f0', borderRadius: 6 }} />
            <select value={ruleStrategy} onChange={e => setRuleStrategy(e.target.value)} style={{ padding: 8, border: '1px solid #e2e8f0', borderRadius: 6, background: '#fff' }}>
              <option value="round_robin">Round Robin</option>
              <option value="specialist">Specialist (Match Tags)</option>
            </select>
            <button className="btn btn-primary" onClick={addRule}>Add</button>
          </div>
        </div>
      );
    }

    const CRM_TOOLS = [
      {
        type: 'function',
        function: {
          name: 'query_leads',
          description: 'Filter leads from the database. Returns up to 20 matching leads ordered by score desc.',
          parameters: {
            type: 'object',
            properties: {
              status: { type: 'string', description: 'Filter by status: new/contacted/qualified/proposal_sent/won/lost' },
              source: { type: 'string', description: 'Filter by traffic source (e.g. meta_general, organic)' },
              min_score: { type: 'integer', description: 'Minimum lead score (inclusive)' },
              has_phone: { type: 'boolean', description: 'If true, only leads with a phone number' },
              days_old: { type: 'integer', description: 'Only leads created in the last N days' },
            },
            required: [],
          },
        },
      },
      {
        type: 'function',
        function: {
          name: 'find_lead_by_name',
          description: 'Find leads by partial first or last name match.',
          parameters: {
            type: 'object',
            properties: { name: { type: 'string', description: 'Name or partial name to search for' } },
            required: ['name'],
          },
        },
      },
      {
        type: 'function',
        function: {
          name: 'query_conversations',
          description: 'Get the last 20 conversation messages for a specific lead.',
          parameters: {
            type: 'object',
            properties: { telegram_id: { type: 'integer', description: "The lead's Telegram ID" } },
            required: ['telegram_id'],
          },
        },
      },
      {
        type: 'function',
        function: {
          name: 'get_analytics',
          description: 'Get aggregate analytics over all leads.',
          parameters: {
            type: 'object',
            properties: {
              metric: {
                type: 'string',
                enum: ['count_by_status', 'count_by_source', 'avg_score', 'conversion_rate', 'total_count'],
                description: 'Which aggregate metric to compute',
              },
            },
            required: ['metric'],
          },
        },
      },
    ];

    async function executeCrmTool(name, args) {
      try {
        if (name === 'query_leads') {
          let q = supabase.from('leads').select('telegram_id, first_name, last_name, username, phone, status, source, lead_score, created_at, first_contact_at');
          if (args.status) q = q.eq('status', args.status);
          if (args.source) q = q.eq('source', args.source);
          if (args.min_score != null) q = q.gte('lead_score', args.min_score);
          if (args.has_phone) q = q.not('phone', 'is', null);
          if (args.days_old) {
            const since = new Date(Date.now() - args.days_old * 86400000).toISOString();
            q = q.gte('created_at', since);
          }
          const { data } = await q.order('lead_score', { ascending: false }).limit(20);
          return JSON.stringify(data || []);
        }
        if (name === 'find_lead_by_name') {
          const { data } = await supabase.from('leads')
            .select('telegram_id, first_name, last_name, username, phone, status, source, lead_score')
            .or(`first_name.ilike.%${args.name}%,last_name.ilike.%${args.name}%`)
            .limit(10);
          return JSON.stringify(data || []);
        }
        if (name === 'query_conversations') {
          const { data } = await supabase.from('conversations')
            .select('role, message, created_at')
            .eq('telegram_id', args.telegram_id)
            .order('created_at', { ascending: false })
            .limit(20);
          return JSON.stringify((data || []).reverse());
        }
        if (name === 'get_analytics') {
          const { data: leads } = await supabase.from('leads').select('status, source, lead_score, phone');
          const all = leads || [];
          if (args.metric === 'total_count') return JSON.stringify({ total: all.length });
          if (args.metric === 'count_by_status') {
            const counts = {};
            all.forEach(l => { counts[l.status || 'new'] = (counts[l.status || 'new'] || 0) + 1; });
            return JSON.stringify(counts);
          }
          if (args.metric === 'count_by_source') {
            const counts = {};
            all.forEach(l => { counts[l.source || 'organic'] = (counts[l.source || 'organic'] || 0) + 1; });
            return JSON.stringify(Object.fromEntries(Object.entries(counts).sort((a, b) => b[1] - a[1])));
          }
          if (args.metric === 'avg_score') {
            const scores = all.map(l => l.lead_score || 0);
            const avg = scores.length ? Math.round(scores.reduce((a, b) => a + b, 0) / scores.length * 10) / 10 : 0;
            return JSON.stringify({ avg_score: avg, sample_size: all.length });
          }
          if (args.metric === 'conversion_rate') {
            const won = all.filter(l => l.status === 'converted').length;
            const rate = all.length ? Math.round(won / all.length * 1000) / 10 : 0;
            return JSON.stringify({ won, total: all.length, conversion_rate_pct: rate });
          }
          return JSON.stringify({ error: 'unknown metric' });
        }
        return JSON.stringify({ error: `unknown tool: ${name}` });
      } catch (e) {
        return JSON.stringify({ error: e.message });
      }
    }

    async function askCrmAI(question, messageHistory) {
      const today = new Date().toISOString().slice(0, 10);
      const systemPrompt = `Ты CRM-аналитик. Сегодня ${today}. Статусы: new/contacted/qualified/proposal_sent/won/lost. Отвечай на русском, кратко и с именами/цифрами.`;
      const messages = [{ role: 'system', content: systemPrompt }, ...messageHistory, { role: 'user', content: question }];

      for (let round = 0; round < 5; round++) {
        // Calls /api/ask (Vercel serverless) — OpenAI key never exposed in browser
        const res = await fetch('/api/ask', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ model: 'gpt-4o-mini', messages, tools: CRM_TOOLS, tool_choice: 'auto' }),
        });
        if (!res.ok) throw new Error(`AI error ${res.status}: ${await res.text()}`);
        const data = await res.json();
        const msg = data.choices[0].message;
        if (!msg.tool_calls || msg.tool_calls.length === 0) return msg.content || 'Нет ответа.';
        messages.push(msg);
        for (const tc of msg.tool_calls) {
          const args = JSON.parse(tc.function.arguments);
          const result = await executeCrmTool(tc.function.name, args);
          messages.push({ role: 'tool', tool_call_id: tc.id, content: result });
        }
      }
      return 'Превышен лимит запросов. Переформулируйте вопрос.';
    }

    const EXAMPLE_QUESTIONS = [

    function AskAI({ open, onClose }) {
      const [messages, setMessages] = useState([]);
      const [input, setInput] = useState('');
      const [loading, setLoading] = useState(false);
      const messagesEndRef = useRef(null);
      const inputRef = useRef(null);

      useEffect(() => {
        if (messagesEndRef.current) messagesEndRef.current.scrollIntoView({ behavior: 'smooth' });
      }, [messages, loading]);

      useEffect(() => {
        if (open && inputRef.current) setTimeout(() => inputRef.current.focus(), 50);
      }, [open]);

      const send = async (text) => {
        const q = text || input.trim();
        if (!q || loading) return;
        setInput('');
        setMessages(prev => [...prev, { role: 'user', content: q }]);
        setLoading(true);
        try {
          const history = messages.slice(-10).map(m => ({ role: m.role, content: m.content }));
          const answer = await askCrmAI(q, history);
          setMessages(prev => [...prev, { role: 'assistant', content: answer }]);
        } catch (e) {
          setMessages(prev => [...prev, { role: 'assistant', content: `❌ Ошибка: ${e.message}` }]);
        } finally {
          setLoading(false);
        }
      };

      const handleKey = e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } };

      return (
        <div className={`ai-panel${open ? ' open' : ''}`}>
          <div className="ai-panel-header">
            <span>Ask AI</span>
            <button className="ai-panel-close" onClick={onClose}>×</button>
          </div>
          {messages.length === 0 && !loading && (
            <div className="ai-examples">
              {EXAMPLE_QUESTIONS.map(q => (
                <button key={q} className="ai-example-chip" onClick={() => send(q)}>{q}</button>
              ))}

          )}
          <div className="ai-messages">
            {messages.map((m, i) => (
              <div key={i} className={`ai-msg ${m.role}`}>{m.content}</div>
            ))}
            {loading && <div className="ai-msg loading">⏳ Анализирую...</div>}
            <div ref={messagesEndRef} />
          </div>
          <div className="ai-input-row">
            <textarea
              ref={inputRef}
              className="ai-input"
              rows="2"
              placeholder="Спросите о лидах..."
              value={input}
              onChange={e => setInput(e.target.value)}
              onKeyDown={handleKey}
            />
            <button className="ai-send-btn" onClick={() => send()} disabled={loading || !input.trim()}>➤</button>
          </div>
        </div>
      );
    }

    function MetricsDashboard({ showToast }) {
      const today = new Date();
      const monthStart = new Date(today.getFullYear(), today.getMonth(), 1).toISOString().split('T')[0];
      const todayStr = today.toISOString().split('T')[0];

      const [loading, setLoading] = useState(true);
      const [leads, setLeads] = useState([]);
      const [prevLeads, setPrevLeads] = useState([]);
      const [engagedIds, setEngagedIds] = useState(new Set());
      const [twaIds, setTwaIds] = useState(new Set());
      const [adSpend, setAdSpend] = useState({});
      const [msgCounts, setMsgCounts] = useState({});
      const [dateFrom, setDateFrom] = useState(monthStart);
      const [dateTo, setDateTo] = useState(todayStr);
      const [editRow, setEditRow] = useState(null);
      const [saving, setSaving] = useState(false);
      const [sortCol, setSortCol] = useState('leads');
      const [sortDir, setSortDir] = useState('desc');
      const [members, setMembers] = useState([]);
      const [heatmapData, setHeatmapData] = useState({ starts: [], phones: [], conversions: [] });
      const [heatmapType, setHeatmapType] = useState('starts');
      const [metricsClients, setMetricsClients] = useState([]);
      const [revEvents, setRevEvents] = useState([]);
      const [prevRevEvents, setPrevRevEvents] = useState([]);
      const [showSettings, setShowSettings] = useState(false);
      const [grossMargin, setGrossMargin] = useState(() => { const v = localStorage.getItem('crm_gross_margin'); return v !== null ? v : ''; });
      const [opCosts, setOpCosts] = useState(() => { const v = localStorage.getItem('crm_op_costs'); return v !== null ? v : ''; });

      const adPeriod = useMemo(() => dateFrom.slice(0, 7), [dateFrom]);

      const prevRange = useMemo(() => {
        const from = new Date(dateFrom);
        const to = new Date(dateTo);
        const span = to - from;
        const prevTo = new Date(from.getTime() - 86400000);
        const prevFrom = new Date(prevTo.getTime() - span);
        return { from: prevFrom.toISOString().split('T')[0], to: prevTo.toISOString().split('T')[0] };
      }, [dateFrom, dateTo]);

      const setPreset = (key) => {
        const t = new Date();
        const fmt = d => d.toISOString().split('T')[0];
        if (key === 'today') { setDateFrom(fmt(t)); setDateTo(fmt(t)); }
        else if (key === 'yesterday') { const y = new Date(t.getTime() - 86400000); setDateFrom(fmt(y)); setDateTo(fmt(y)); }
        else if (key === '7d') { setDateFrom(fmt(new Date(t.getTime() - 6*86400000))); setDateTo(fmt(t)); }
        else if (key === '14d') { setDateFrom(fmt(new Date(t.getTime() - 13*86400000))); setDateTo(fmt(t)); }
        else if (key === '30d') { setDateFrom(fmt(new Date(t.getTime() - 29*86400000))); setDateTo(fmt(t)); }
        else if (key === 'month') { setDateFrom(fmt(new Date(t.getFullYear(), t.getMonth(), 1))); setDateTo(fmt(t)); }
        else if (key === 'lastmonth') {
          const first = new Date(t.getFullYear(), t.getMonth() - 1, 1);
          const last = new Date(t.getFullYear(), t.getMonth(), 0);
          setDateFrom(fmt(first)); setDateTo(fmt(last));
        }
      };

      const load = useCallback(async () => {
        setLoading(true);
        try {
          const periodStart = `${dateFrom}T00:00:00`;
          const periodEnd = `${dateTo}T23:59:59`;
          const prevStart = `${prevRange.from}T00:00:00`;
          const prevEnd = `${prevRange.to}T23:59:59`;

          const [lRes, plRes, cRes, eRes, aRes, mcRes, mRes, evRes, shRes, clRes, revRes, prevRevRes] = await Promise.all([
            supabase.from('leads').select('telegram_id, source, status, phone, deal_value, deal_currency, created_at, first_contact_at, assigned_to, rejection_reason').gte('created_at', periodStart).lte('created_at', periodEnd),
            supabase.from('leads').select('telegram_id, status, phone, deal_value, created_at').gte('created_at', prevStart).lte('created_at', prevEnd),
            supabase.from('conversations').select('telegram_id').eq('role', 'user'),
            supabase.from('events').select('telegram_id').eq('event_type', 'twa_open'),
            supabase.from('ad_campaigns').select('*').eq('period', adPeriod),
            supabase.from('conversations').select('telegram_id, id').eq('role', 'user'),
            supabase.from('team_members').select('*'),
            supabase.from('events').select('created_at').eq('event_type', 'bot_start'),
            supabase.from('status_history').select('created_at').eq('new_status', 'converted'),
            supabase.from('clients').select('estimated_ltv'),
            supabase.from('revenue_events').select('telegram_id, amount, event_type').gte('event_date', dateFrom).lte('event_date', dateTo),
            supabase.from('revenue_events').select('amount, event_type').gte('event_date', prevRange.from).lte('event_date', prevRange.to),
          ]);
          setLeads(lRes.data || []);
          setPrevLeads(plRes.data || []);
          setEngagedIds(new Set((cRes.data || []).map(r => r.telegram_id)));
          setTwaIds(new Set((eRes.data || []).map(r => r.telegram_id)));
          const sm = {};
          (aRes.data || []).forEach(a => { sm[a.campaign_key] = a; });
          setAdSpend(sm);
          const mc = {};
          (mcRes.data || []).forEach(r => { mc[r.telegram_id] = (mc[r.telegram_id] || 0) + 1; });
          setMsgCounts(mc);
          setMembers(mRes.data || []);
          setMetricsClients(clRes.data || []);
          setRevEvents(revRes.data || []);
          setPrevRevEvents(prevRevRes.data || []);
          const starts = evRes.data || [];
          const phones = (lRes.data || []).filter(l => l.phone).map(l => ({ created_at: l.created_at }));
          const conversions = shRes.data || [];
          setHeatmapData({ starts, phones, conversions });
        } catch (e) {
          showToast('Failed to load metrics: ' + e.message, 'error');
        } finally {
          setLoading(false);
        }
      }, [showToast, dateFrom, dateTo, adPeriod, prevRange]);

      useEffect(() => { load(); }, [load]);

      const saveSpend = async (e) => {
        e.stopPropagation();
        if (!editRow) return;
        setSaving(true);
        try {
          const existing = adSpend[editRow.key];
          const payload = {
            campaign_key: editRow.key,
            name: editRow.name || editRow.key,
            period: adPeriod,
            spend: parseFloat(editRow.spend) || 0,
            impressions: parseInt(editRow.impressions) || 0,
            clicks: parseInt(editRow.clicks) || 0,
            updated_at: new Date().toISOString(),
          };
          let res;
          if (existing?.id) {
            res = await supabase.from('ad_campaigns').update(payload).eq('id', existing.id);
          } else {
            res = await supabase.from('ad_campaigns').insert(payload);
          }
          if (res.error) throw res.error;
          setEditRow(null);
          await load();
          showToast('Saved', 'success');
        } catch (e) {
          showToast('Save failed: ' + (e.message || JSON.stringify(e)), 'error');
        } finally {
          setSaving(false);
        }
      };

      if (loading) return <div className="center-load"><div className="spinner" /></div>;

      // ── Compute metrics ──────────────────────────────
      const total = leads.length;
      const prevTotal = prevLeads.length;
      const engaged = leads.filter(l => engagedIds.has(l.telegram_id)).length;
      const withPhone = leads.filter(l => l.phone).length;
      const qualified = leads.filter(l => ['qualified','proposal_sent','negotiation','converted'].includes(l.status)).length;
      const proposalSent = leads.filter(l => ['proposal_sent','negotiation','converted'].includes(l.status)).length;
      const converted = leads.filter(l => l.status === 'converted').length;
      const prevConverted = prevLeads.filter(l => l.status === 'converted').length;
      const twaOpen = leads.filter(l => twaIds.has(l.telegram_id)).length;

      const dealRevenue = leads.filter(l => l.status === 'converted').reduce((s, l) => s + (l.deal_value || 0), 0);
      const prevDealRevenue = prevLeads.filter(l => l.status === 'converted').reduce((s, l) => s + (l.deal_value || 0), 0);
      const collectedRevenue = revEvents.filter(e => ['payment','new_retainer','project_milestone','one_time_fee'].includes(e.event_type)).reduce((s, e) => s + (e.amount || 0), 0);
      const prevCollected = prevRevEvents.filter(e => ['payment','new_retainer','project_milestone','one_time_fee'].includes(e.event_type)).reduce((s, e) => s + (e.amount || 0), 0);
      const totalRevenue = collectedRevenue > 0 ? collectedRevenue : dealRevenue;
      const prevRevenue = prevCollected > 0 ? prevCollected : prevDealRevenue;
      const hasCollectedData = collectedRevenue > 0;
      const totalSpend = Object.values(adSpend).reduce((s, a) => s + (a.spend || 0), 0);
      const marginPct = grossMargin !== '' && !isNaN(grossMargin) ? parseFloat(grossMargin) / 100 : 1;
      const operatingCosts = opCosts !== '' && !isNaN(opCosts) ? parseFloat(opCosts) : 0;
      const convRate = total ? (converted / total * 100).toFixed(1) : '0.0';
      const prevConvRate = prevTotal ? (prevConverted / prevTotal * 100).toFixed(1) : '0.0';
      const phoneRate = total ? (withPhone / total * 100).toFixed(1) : '0.0';
      const avgDeal = converted ? Math.round(dealRevenue / converted) : 0;
      const grossProfit = totalRevenue * marginPct;
      const netProfit = grossProfit - totalSpend - operatingCosts;
      const overallRoas = totalSpend > 0 ? (totalRevenue / totalSpend).toFixed(1) : null;
      const overallCpl = totalSpend > 0 && total > 0 ? (totalSpend / total).toFixed(2) : null;

      const lvr = prevTotal > 0 ? (((total - prevTotal) / prevTotal) * 100).toFixed(0) : null;
      const responseTimes = leads.filter(l => l.first_contact_at && l.created_at).map(l => (new Date(l.first_contact_at) - new Date(l.created_at)) / 60000);
      const avgResponseMin = responseTimes.length > 0 ? Math.round(responseTimes.reduce((a,b) => a+b, 0) / responseTimes.length) : null;
      const avgResponseStr = avgResponseMin !== null ? (avgResponseMin < 60 ? `${avgResponseMin}m` : `${(avgResponseMin/60).toFixed(1)}h`) : '\u2014';
      const leadTids = new Set(leads.map(l => l.telegram_id));
      const totalMsgs = Object.entries(msgCounts).filter(([tid]) => leadTids.has(Number(tid) || tid)).reduce((s, [,c]) => s + c, 0);
      const avgMsgsPerLead = total > 0 ? (totalMsgs / total).toFixed(1) : '0';
      const manualLtvs = metricsClients.filter(c => c.estimated_ltv > 0).map(c => parseFloat(c.estimated_ltv));
      const ltv = manualLtvs.length > 0 ? Math.round(manualLtvs.reduce((a, b) => a + b, 0) / manualLtvs.length) : (avgDeal > 0 ? avgDeal : null);
      const overallCac = totalSpend > 0 && converted > 0 ? (totalSpend / converted).toFixed(2) : null;
      const roi = totalSpend > 0 ? ((netProfit / totalSpend) * 100).toFixed(0) : null;

      const trendFn = (curr, prev) => {
        if (prev === 0 || prev === null || prev === undefined) return null;
        const diff = ((curr - prev) / prev * 100).toFixed(0);
        if (diff > 0) return { arrow: '\u2191', color: '#16A34A', text: `+${diff}%` };
        if (diff < 0) return { arrow: '\u2193', color: '#DC2626', text: `${diff}%` };
        return null;
      };

      const pct = (n, d) => d ? (n / d * 100).toFixed(0) : '0';
      const funnel = [
        { label: '/start', count: total, color: '#4F46E5' },
        { label: 'Engaged', count: engaged, color: '#7C3AED', drop: pct(total - engaged, total) },
        { label: 'Phone', count: withPhone, color: '#2563EB', drop: pct(engaged - withPhone, engaged) },
        { label: 'Qualified', count: qualified, color: '#0891B2', drop: pct(withPhone - qualified, withPhone) },
        { label: 'Proposal', count: proposalSent, color: '#059669', drop: pct(qualified - proposalSent, qualified) },
        { label: 'Converted', count: converted, color: '#16A34A', drop: pct(proposalSent - converted, proposalSent) },
      ];
      const funnelMax = total || 1;

      // ── Per-source table ─────────────────────────────
      const srcMap = {};
      leads.forEach(l => {
        const s = l.source || 'organic';
        if (!srcMap[s]) srcMap[s] = { leads: 0, converted: 0, phone: 0, revenue: 0, collected: 0 };
        srcMap[s].leads++;
        if (l.phone) srcMap[s].phone++;
        if (l.status === 'converted') { srcMap[s].converted++; srcMap[s].revenue += l.deal_value || 0; }
      });
      const convertedTidToSource = {};
      leads.filter(l => l.status === 'converted').forEach(l => { convertedTidToSource[l.telegram_id] = l.source || 'organic'; });
      revEvents.filter(e => ['payment','new_retainer','project_milestone','one_time_fee'].includes(e.event_type)).forEach(e => {
        const src = convertedTidToSource[e.telegram_id];
        if (src && srcMap[src]) srcMap[src].collected += e.amount || 0;
      });
      const rowsRaw = Object.entries(srcMap)
        .map(([src, d]) => {
          const ad = adSpend[src];
          const spend = ad?.spend || 0;
          const srcRev = d.collected > 0 ? d.collected : d.revenue;
          return {
            src, ...d,
            spend,
            impressions: ad?.impressions || 0,
            clicks: ad?.clicks || 0,
            cpl: spend > 0 && d.leads > 0 ? parseFloat((spend / d.leads).toFixed(2)) : null,
            cac: spend > 0 && d.converted > 0 ? parseFloat((spend / d.converted).toFixed(2)) : null,
            roas: spend > 0 && srcRev > 0 ? parseFloat((srcRev / spend).toFixed(1)) : null,
            ctr: ad?.impressions > 0 && ad?.clicks > 0 ? parseFloat((ad.clicks / ad.impressions * 100).toFixed(2)) : null,
            cpm: ad?.impressions > 0 && spend > 0 ? parseFloat((spend / ad.impressions * 1000).toFixed(2)) : null,
            cpc: ad?.clicks > 0 && spend > 0 ? parseFloat((spend / ad.clicks).toFixed(2)) : null,
            phoneRate: d.leads > 0 ? parseFloat((d.phone / d.leads * 100).toFixed(1)) : 0,
          };
        });

      const toggleSort = (col) => {
        if (sortCol === col) setSortDir(d => d === 'asc' ? 'desc' : 'asc');
        else { setSortCol(col); setSortDir('desc'); }
      };
      const rows = [...rowsRaw].sort((a, b) => {
        const av = a[sortCol] ?? -Infinity;
        const bv = b[sortCol] ?? -Infinity;
        return sortDir === 'asc' ? (av > bv ? 1 : -1) : (bv > av ? 1 : -1);
      });

      const totalImpressions = Object.values(adSpend).reduce((s, a) => s + (a.impressions || 0), 0);
      const totalClicks = Object.values(adSpend).reduce((s, a) => s + (a.clicks || 0), 0);

      const SortTh = ({ col, children, align }) => (
        <th onClick={() => toggleSort(col)} style={{ textAlign: align || 'right', cursor: 'pointer', userSelect: 'none', whiteSpace: 'nowrap' }}>
          {children} {sortCol === col ? (sortDir === 'desc' ? '\u25BE' : '\u25B4') : ''}
        </th>
      );

      const lostLeads = leads.filter(l => l.status === 'lost');
      const prevLost = prevLeads.filter(l => l.status === 'lost');

      const kpiSections = [
        { title: 'Lead Acquisition', icon: '\uD83D\uDCE5', color: '#4F46E5', items: [
          { label: 'Total Leads', value: total, sub: null, trend: trendFn(total, prevTotal), help: 'Total unique users who started the bot in this period.' },
          { label: 'Lead Velocity', value: lvr !== null ? `${lvr}%` : '\u2014', sub: lvr !== null ? 'vs prev. period' : 'need prior data', trend: null, help: 'Period-over-period growth in new leads.' },
          { label: 'Phone Rate', value: `${phoneRate}%`, sub: `${withPhone} leads`, trend: null, help: 'Percentage of leads who shared their phone number.' },
          { label: 'Bot Engagement', value: `${total ? (engaged/total*100).toFixed(0) : 0}%`, sub: `${engaged} engaged`, trend: null, help: 'Leads who sent at least one message to the AI chat.' },
          { label: 'TWA Opens', value: `${total ? (twaOpen/total*100).toFixed(0) : 0}%`, sub: `${twaOpen} opens`, trend: null, help: 'Leads who opened the Telegram Web App.' },
        ]},
        { title: 'Conversion & Pipeline', icon: '\uD83D\uDD04', color: '#0891B2', items: [
          { label: 'Conversion Rate', value: `${convRate}%`, sub: `${converted} converted`, trend: trendFn(parseFloat(convRate), parseFloat(prevConvRate)), help: 'Converted / total leads \u00d7 100.' },
          { label: 'Avg Response', value: avgResponseStr, sub: responseTimes.length > 0 ? `${responseTimes.length} tracked` : null, trend: null, help: 'Avg time between lead\u2019s first message and your first contact.' },
          { label: 'Msgs / Lead', value: avgMsgsPerLead, sub: `${totalMsgs} total`, trend: null, help: 'Average messages each lead sends to the bot.' },
          { label: 'Avg Deal Size', value: avgDeal > 0 ? fmtRevenue(avgDeal) : '\u2014', sub: null, trend: null, help: 'Average revenue per converted deal.' },
          { label: 'Loss Rate', value: `${total ? (lostLeads.length / total * 100).toFixed(1) : 0}%`, sub: `${lostLeads.length} lost`, trend: trendFn(lostLeads.length, prevLost.length), help: 'Percentage of leads marked as lost.' },
        ]},
        { title: 'Revenue & Spend', icon: '\uD83D\uDCB0', color: '#16A34A', items: [
          { label: hasCollectedData ? 'Collected Revenue' : 'Deal Value', value: totalRevenue > 0 ? fmtRevenue(totalRevenue) : '\u2014', sub: hasCollectedData ? `deals: ${fmtRevenue(dealRevenue)}` : `${converted} deals`, trend: trendFn(totalRevenue, prevRevenue), help: hasCollectedData ? 'Actual collected revenue from logged payment events.' : 'Total deal value from converted leads. Log revenue events in Clients tab for actual collected amounts.' },
          { label: 'Total Spend', value: totalSpend > 0 ? fmtRevenue(totalSpend) : '\u2014', sub: operatingCosts > 0 ? `+${fmtRevenue(operatingCosts)} ops` : adPeriod, trend: null, help: 'Ad spend + operating costs. Set operating costs in Settings.' },
          { label: 'Net Profit', value: totalRevenue > 0 || totalSpend > 0 ? fmtRevenue(netProfit) : '\u2014', sub: marginPct < 1 ? `${(marginPct*100).toFixed(0)}% margin` : (netProfit >= 0 ? 'net positive' : 'net negative'), trend: null, help: `Revenue${marginPct < 1 ? ' × gross margin' : ''} − ad spend${operatingCosts > 0 ? ' − operating costs' : ''}. Set margin & costs in Settings.` },
        ]},
        { title: 'Ad Efficiency', icon: '\uD83D\uDCCA', color: '#DC2626', items: [
          { label: 'CPL', value: overallCpl ? `$${overallCpl}` : '\u2014', sub: null, trend: null, help: 'Cost Per Lead \u2014 ad spend / total leads.' },
          { label: 'CAC', value: overallCac ? `$${overallCac}` : '\u2014', sub: converted > 0 ? `${converted} deals` : null, trend: null, help: 'Customer Acquisition Cost \u2014 spend / converted leads.' },
          { label: 'ROAS', value: overallRoas ? `${overallRoas}x` : '\u2014', sub: null, trend: null, help: 'Return On Ad Spend \u2014 revenue / spend. Above 3x is healthy.' },
          { label: 'ROI', value: roi !== null ? `${roi}%` : '\u2014', sub: roi !== null ? (parseFloat(roi) > 0 ? 'profitable' : 'negative') : null, trend: null, help: 'Net profit / total spend \u00d7 100. Accounts for gross margin and operating costs if set.' },
          { label: 'CTR', value: totalImpressions > 0 && totalClicks > 0 ? `${(totalClicks/totalImpressions*100).toFixed(2)}%` : '\u2014', sub: totalClicks > 0 ? `${totalClicks.toLocaleString()} clicks` : null, trend: null, help: 'Clicks / impressions \u00d7 100.' },
        ]},
      ];

      // ── Heatmap ──────────────────────────────────────
      const activeEvents = heatmapData[heatmapType] || [];
      const grid = Array.from({length: 7}, () => Array(24).fill(0));
      let maxVal = 0;
      const dayMapH = { 'Sun': 0, 'Mon': 1, 'Tue': 2, 'Wed': 3, 'Thu': 4, 'Fri': 5, 'Sat': 6 };
      activeEvents.forEach(ev => {
        const d = new Date(ev.created_at);
        const parts = {};
        new Intl.DateTimeFormat('en-US', { timeZone: 'Asia/Tashkent', weekday: 'short', hour: 'numeric', hour12: false }).formatToParts(d).forEach(p => parts[p.type] = p.value);
        const day = dayMapH[parts.weekday];
        const hour = parseInt(parts.hour) % 24;
        if (day !== undefined && hour !== undefined) { grid[day][hour]++; if (grid[day][hour] > maxVal) maxVal = grid[day][hour]; }
      });
      const dayNames = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];

      // ── Lost Leads ──────────────────────────────────
      const lossRate = total > 0 ? (lostLeads.length / total * 100).toFixed(1) : '0.0';
      const reasonMap = {};
      lostLeads.forEach(l => {
        const r = (l.rejection_reason || 'No reason given').split(' — ')[0];
        reasonMap[r] = (reasonMap[r] || 0) + 1;
      });
      const lostReasonRows = Object.entries(reasonMap).sort((a, b) => b[1] - a[1]);
      const LOST_COLORS = ['#EF4444', '#F97316', '#F59E0B', '#EAB308', '#84CC16', '#06B6D4', '#8B5CF6', '#EC4899'];

      // ── Leaderboard ──────────────────────────────────
      const revByTid = {};
      revEvents.filter(e => ['payment','new_retainer','project_milestone','one_time_fee'].includes(e.event_type)).forEach(e => {
        revByTid[e.telegram_id] = (revByTid[e.telegram_id] || 0) + (e.amount || 0);
      });
      const lb = members.map(m => {
        const assigned = leads.filter(l => l.assigned_to === m.name);
        const won = assigned.filter(l => l.status === 'converted');
        const dealRev = won.reduce((sum, l) => sum + (l.deal_value || 0), 0);
        const collectedRev = won.reduce((sum, l) => sum + (revByTid[l.telegram_id] || 0), 0);
        const revenue = collectedRev > 0 ? collectedRev : dealRev;
        return { ...m, assigned: assigned.length, won: won.length, revenue };
      }).sort((a, b) => b.revenue - a.revenue);

      const saveSettings = () => {
        if (grossMargin !== '' && !isNaN(grossMargin)) localStorage.setItem('crm_gross_margin', grossMargin);
        else localStorage.removeItem('crm_gross_margin');
        if (opCosts !== '' && !isNaN(opCosts)) localStorage.setItem('crm_op_costs', opCosts);
        else localStorage.removeItem('crm_op_costs');
        setShowSettings(false);
      };

      return (
        <div style={{ maxWidth: 1100 }}>
          {/* Settings Modal */}
          {showSettings && (
            <div className="panel-overlay" style={{ zIndex: 9999 }}>
              <div className="panel" style={{ width: 420, margin: '12vh auto', height: 'max-content', padding: 0 }}>
                <div className="panel-header" style={{ padding: '20px 24px', borderBottom: '1px solid #e2e8f0' }}>
                  <h2 style={{ fontSize: 18, margin: 0 }}>Business Settings</h2>
                  <button className="btn" onClick={() => setShowSettings(false)} style={{ border: 'none', background: 'none', fontSize: 18 }}>\u2715</button>
                </div>
                <div style={{ padding: 24 }}>
                  <p style={{ fontSize: 13, color: '#64748b', margin: '0 0 20px', lineHeight: 1.5 }}>
                    These values improve accuracy of Profit, ROI, and LTV calculations. Stored locally in your browser.
                  </p>
                  <div style={{ marginBottom: 16 }}>
                    <label style={{ display: 'block', fontSize: 13, fontWeight: 600, color: '#334155', marginBottom: 6 }}>Gross Margin %</label>
                    <input type="number" min="0" max="100" step="1" value={grossMargin} onChange={e => setGrossMargin(e.target.value)}
                      placeholder="e.g. 70 (leave empty = 100%)"
                      style={{ width: '100%', padding: '10px 12px', border: '1px solid #cbd5e1', borderRadius: 6, fontSize: 14, boxSizing: 'border-box' }} />
                    <span style={{ fontSize: 11, color: '#94a3b8', marginTop: 4, display: 'block' }}>Revenue after direct costs (COGS). Empty = no margin applied.</span>
                  </div>
                  <div style={{ marginBottom: 24 }}>
                    <label style={{ display: 'block', fontSize: 13, fontWeight: 600, color: '#334155', marginBottom: 6 }}>Monthly Operating Costs ($)</label>
                    <input type="number" min="0" step="100" value={opCosts} onChange={e => setOpCosts(e.target.value)}
                      placeholder="e.g. 2000 (salaries, tools, rent)"
                      style={{ width: '100%', padding: '10px 12px', border: '1px solid #cbd5e1', borderRadius: 6, fontSize: 14, boxSizing: 'border-box' }} />
                    <span style={{ fontSize: 11, color: '#94a3b8', marginTop: 4, display: 'block' }}>Subtracted from profit alongside ad spend. Empty = $0.</span>
                  </div>
                  <div style={{ display: 'flex', gap: 12 }}>
                    <button className="btn" style={{ flex: 1, padding: '10px 0' }} onClick={() => setShowSettings(false)}>Cancel</button>
                    <button className="btn btn-primary" style={{ flex: 1, padding: '10px 0' }} onClick={saveSettings}>Save</button>
                  </div>
                </div>
              </div>
            </div>
          )}

          {/* Header with date range */}
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 16, flexWrap: 'wrap', gap: 10 }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
              <h2 style={{ fontSize: 18, fontWeight: 700, letterSpacing: '-0.3px', margin: 0 }}>Metrics & Analytics</h2>
              <button className="btn" onClick={() => setShowSettings(true)} title="Business Settings"
                style={{ padding: '4px 8px', fontSize: 14, background: 'var(--surface)', border: '1px solid var(--border)', cursor: 'pointer', lineHeight: 1 }}>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
              </button>
            </div>
            <div style={{ display: 'flex', alignItems: 'center', gap: 6, flexWrap: 'wrap' }}>
              {[['Today','today'],['Yesterday','yesterday'],['7D','7d'],['14D','14d'],['30D','30d'],['This Month','month'],['Last Month','lastmonth']].map(([lbl, key]) => (
                <button key={key} className="btn" onClick={() => setPreset(key)}
                  style={{ padding: '4px 10px', fontSize: 11.5, fontWeight: 600, background: 'var(--surface)', border: '1px solid var(--border)' }}>
                  {lbl}
                </button>
              ))}
              <input type="date" value={dateFrom} onChange={e => setDateFrom(e.target.value)}
                style={{ padding: '5px 8px', border: '1px solid var(--border)', borderRadius: 'var(--r)', fontSize: 12.5, fontFamily: 'inherit', outline: 'none', background: 'var(--bg)' }} />
              <span style={{ color: 'var(--text-3)', fontSize: 12 }}>\u2014</span>
              <input type="date" value={dateTo} onChange={e => setDateTo(e.target.value)}
                style={{ padding: '5px 8px', border: '1px solid var(--border)', borderRadius: 'var(--r)', fontSize: 12.5, fontFamily: 'inherit', outline: 'none', background: 'var(--bg)' }} />
            </div>
          </div>

          {/* KPI Sections */}
          {kpiSections.map(section => (
            <div key={section.title} style={{ marginBottom: 20 }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 10 }}>
                <span style={{ fontSize: 15 }}>{section.icon}</span>

                <option value="conversions">Conversions (Won)</option>

              <div style={{ display: 'flex', flexDirection: 'column', gap: 2, marginRight: 8, marginTop: 24 }}>
                {dayNames.map(d => <div key={d} style={{ height: 24, fontSize: 11, color: '#64748b', display: 'flex', alignItems: 'center' }}>{d}</div>)}
              </div>
              <div style={{ flex: 1, display: 'flex', flexDirection: 'column', gap: 2 }}>
                <div style={{ display: 'flex', gap: 2, height: 20 }}>
                  {Array.from({length: 24}).map((_, h) => <div key={h} style={{ flex: 1, fontSize: 10, color: '#64748b', textAlign: 'center' }}>{h.toString().padStart(2, '0')}</div>)}
                </div>
                {grid.map((row, dayIdx) => (
                  <div key={dayIdx} style={{ display: 'flex', gap: 2 }}>
                    {row.map((val, h) => {
                      const intensity = maxVal === 0 ? 0 : val / maxVal;
                      const bg = maxVal === 0 ? '#f1f5f9' : `rgba(16, 185, 129, ${Math.max(0.05, intensity)})`;
                      return <div key={h} style={{ flex: 1, height: 24, backgroundColor: bg, borderRadius: 2 }} title={`${dayNames[dayIdx]} ${h}:00 \u2014 ${val} events`} />
                    })}
                  </div>
                ))}
              </div>
            </div>
          </div>

          {/* Lost Leads Analytics */}
          {lostLeads.length > 0 && (
            <div className="card" style={{ marginBottom: 20 }}>
              <h3 style={{ margin: '0 0 16px 0' }}>Lost Leads Analysis</h3>
              <div style={{ display: 'flex', gap: 16, flexWrap: 'wrap', marginBottom: 16 }}>
                <div style={{ background: '#fef2f2', borderRadius: 8, padding: '12px 20px', flex: '1 1 140px', minWidth: 140 }}>
                  <div style={{ fontSize: 11, color: '#dc2626', fontWeight: 600, textTransform: 'uppercase', marginBottom: 4 }}>Lost</div>
                  <div style={{ fontSize: 24, fontWeight: 800, color: '#991b1b' }}>{lostLeads.length}</div>
                  <div style={{ fontSize: 12, color: '#b91c1c' }}>{lossRate}% of all leads</div>
                </div>
                <div style={{ background: '#fef2f2', borderRadius: 8, padding: '12px 20px', flex: '1 1 140px', minWidth: 140 }}>
                  <div style={{ fontSize: 11, color: '#dc2626', fontWeight: 600, textTransform: 'uppercase', marginBottom: 4 }}>vs Prev Period</div>
                  <div style={{ fontSize: 24, fontWeight: 800, color: '#991b1b' }}>
                    {prevLost.length > 0 ? `${lostLeads.length > prevLost.length ? '+' : ''}${lostLeads.length - prevLost.length}` : '—'}
                  </div>
                  <div style={{ fontSize: 12, color: '#b91c1c' }}>{prevLost.length} prev</div>
                </div>
                <div style={{ background: '#fef2f2', borderRadius: 8, padding: '12px 20px', flex: '1 1 140px', minWidth: 140 }}>
                  <div style={{ fontSize: 11, color: '#dc2626', fontWeight: 600, textTransform: 'uppercase', marginBottom: 4 }}>Unique Reasons</div>
                  <div style={{ fontSize: 24, fontWeight: 800, color: '#991b1b' }}>{lostReasonRows.length}</div>
                  <div style={{ fontSize: 12, color: '#b91c1c' }}>categories</div>
                </div>
              </div>
              <div style={{ display: 'flex', gap: 20, flexWrap: 'wrap' }}>
                {/* Bar chart */}
                <div style={{ flex: '2 1 300px', minWidth: 280 }}>
                  {lostReasonRows.map(([reason, count], i) => {
                    const pct = (count / lostLeads.length * 100).toFixed(0);
                    return (
                      <div key={reason} style={{ marginBottom: 8 }}>
                        <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 13, marginBottom: 3 }}>
                          <span style={{ fontWeight: 500, color: '#334155', maxWidth: '70%', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{reason}</span>
                          <span style={{ fontWeight: 700, color: '#991b1b' }}>{count} ({pct}%)</span>
                        </div>
                        <div style={{ height: 8, background: '#fee2e2', borderRadius: 4, overflow: 'hidden' }}>
                          <div style={{ width: `${pct}%`, height: '100%', background: LOST_COLORS[i % LOST_COLORS.length], borderRadius: 4, transition: 'width 0.3s' }} />
                        </div>
                      </div>
                    );
                  })}
                </div>
                {/* Donut-like breakdown */}
                <div style={{ flex: '1 1 200px', minWidth: 180 }}>
                  <div style={{ fontSize: 12, fontWeight: 600, color: '#64748b', marginBottom: 8, textTransform: 'uppercase' }}>By Source</div>
                  {(() => {
                    const srcLost = {};
                    lostLeads.forEach(l => {
                      const s = l.source || 'organic';
                      srcLost[s] = (srcLost[s] || 0) + 1;
                    });
                    return Object.entries(srcLost).sort((a, b) => b[1] - a[1]).map(([src, cnt]) => (
                      <div key={src} style={{ display: 'flex', justifyContent: 'space-between', padding: '4px 0', borderBottom: '1px solid #fef2f2', fontSize: 13 }}>
                        <span style={{ color: '#475569' }}>{src}</span>
                        <span style={{ fontWeight: 600, color: '#991b1b' }}>{cnt} ({(cnt / lostLeads.length * 100).toFixed(0)}%)</span>
                      </div>

                  })()}
                </div>
              </div>
            </div>
          )}

          {/* Team Leaderboard */}
          {members.length > 0 && (
            <div className="card">
              <h3 style={{ marginBottom: 12 }}>Team Leaderboard</h3>
              <div style={{ border: '1px solid #e2e8f0', borderRadius: 8, overflow: 'hidden' }}>
                <table style={{ width: '100%', borderCollapse: 'collapse', textAlign: 'left', fontSize: 14 }}>
                  <thead style={{ background: '#f8fafc' }}>
                    <tr>
                      <th style={{ padding: '10px 16px', borderBottom: '1px solid #e2e8f0' }}>Agent</th>
                      <th style={{ padding: '10px 16px', borderBottom: '1px solid #e2e8f0' }}>Assigned</th>
                      <th style={{ padding: '10px 16px', borderBottom: '1px solid #e2e8f0' }}>Won</th>
                      <th style={{ padding: '10px 16px', borderBottom: '1px solid #e2e8f0' }}>Conv. %</th>
                      <th style={{ padding: '10px 16px', borderBottom: '1px solid #e2e8f0' }}>Revenue</th>

                  <tbody>
                    {lb.map(m => {
                      const cr = m.assigned > 0 ? Math.round((m.won / m.assigned) * 100) : 0;

                        <tr key={m.id} style={{ borderBottom: '1px solid #f1f5f9' }}>

                          </td>
                          <td style={{ padding: '10px 16px', fontWeight: 600, color: '#0f172a' }}>{fmtRevenue(m.revenue)}</td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
                {lb.length === 0 && <div style={{ padding: 16, color: '#64748b' }}>No agents mapped yet.</div>}
              </div>
            </div>
          )}
        </div>
      );
    }

    function LogEventModal({ client, onSuccess, onCancel, showToast }) {
      const [type, setType] = useState('payment');
      const [amount, setAmount] = useState(client.retainer_amount || '');
      const [date, setDate] = useState(new Date().toISOString().split('T')[0]);
      const [notes, setNotes] = useState('');
      const [saving, setSaving] = useState(false);

      const save = async () => {
        setSaving(true);
        try {
          const { error } = await supabase.from('revenue_events').insert({
            telegram_id: client.telegram_id,
            event_date: date,
            event_month: date.substring(0, 7),
            amount: parseFloat(amount) || 0,
            currency: client.currency || 'USD',
            event_type: type,
            notes: notes
          });
          if (error) throw error;
          
          if (type === 'cancellation') {
             await supabase.from('clients').update({ retainer_status: 'cancelled', retainer_end_date: date, churn_reason: notes }).eq('telegram_id', client.telegram_id);
          } else if (type === 'upgrade' || type === 'downgrade') {
             // Let the user manually adjust the active amount later if needed
          }
          
          showToast('Event logged successfully', 'success');
          onSuccess();
        } catch (err) {
          showToast('Error logging event: ' + err.message, 'error');
        } finally {
          setSaving(false);
        }
      };

      return (
        <div className="panel-overlay" style={{ zIndex: 9999 }}>
          <div className="panel" style={{ width: 450, margin: '10vh auto', height: 'max-content', padding: 0 }}>
            <div className="panel-header" style={{ padding: '20px 24px', borderBottom: '1px solid #e2e8f0' }}>
              <h2 style={{ fontSize: 18, margin: 0 }}>Log Revenue Event</h2>
              <button className="btn" onClick={onCancel} style={{ border: 'none', background: 'none', fontSize: 18 }}>✕</button>
            </div>
            <div className="panel-section" style={{ padding: 24, border: 'none' }}>
              <div className="form-group" style={{ marginBottom: 16 }}>
                <label style={{ display: 'block', fontSize: 13, fontWeight: 600, color: '#334155', marginBottom: 6 }}>Event Type</label>
                <select value={type} onChange={e => setType(e.target.value)} style={{ width: '100%', padding: '10px 12px', border: '1px solid #cbd5e1', borderRadius: 6, fontSize: 14 }}>
                  <option value="payment">Monthly Payment</option>
                  <option value="project_milestone">Project Milestone</option>
                  <option value="one_time_fee">One-time Fee</option>
                  <option value="upgrade">Upgrade / Expansion</option>
                  <option value="downgrade">Downgrade / Contraction</option>
                  <option value="cancellation">Cancellation (Churn)</option>
                </select>
              </div>
              
              <div className="form-group" style={{ marginBottom: 16 }}>
                <label style={{ display: 'block', fontSize: 13, fontWeight: 600, color: '#334155', marginBottom: 6 }}>Amount ({client.currency})</label>
                <input type="number" value={amount} onChange={e => setAmount(e.target.value)} placeholder="0.00" style={{ width: '100%', padding: '10px 12px', border: '1px solid #cbd5e1', borderRadius: 6, fontSize: 14, boxSizing:'border-box' }} />
              </div>
              
              <div className="form-group" style={{ marginBottom: 16 }}>
                <label style={{ display: 'block', fontSize: 13, fontWeight: 600, color: '#334155', marginBottom: 6 }}>Date</label>
                <input type="date" value={date} onChange={e => setDate(e.target.value)} style={{ width: '100%', padding: '10px 12px', border: '1px solid #cbd5e1', borderRadius: 6, fontSize: 14, boxSizing:'border-box' }} />
              </div>
              
              <div className="form-group" style={{ marginBottom: 24 }}>
                <label style={{ display: 'block', fontSize: 13, fontWeight: 600, color: '#334155', marginBottom: 6 }}>Notes</label>
                <input type="text" value={notes} onChange={e => setNotes(e.target.value)} placeholder="Optional note or reason..." style={{ width: '100%', padding: '10px 12px', border: '1px solid #cbd5e1', borderRadius: 6, fontSize: 14, boxSizing:'border-box' }} />
              </div>

              <div style={{ display: 'flex', gap: 12, marginTop: 32 }}>
                <button className="btn" style={{ flex: 1, padding: '10px 0', fontSize: 14 }} onClick={onCancel}>Cancel</button>
                <button className="btn btn-primary" style={{ flex: 1, padding: '10px 0', fontSize: 14 }} disabled={saving} onClick={save}>
                  {saving ? 'Saving...' : 'Save Event'}
                </button>
              </div>
            </div>
          </div>
        </div>
      );
    }

    function ClientsTab({ showToast, onOpenLead }) {
      const [metrics, setMetrics] = useState(null);
      const [history, setHistory] = useState([]);
      const [clients, setClients] = useState([]);
      const [loading, setLoading] = useState(true);
      const [eventClient, setEventClient] = useState(null);
      
      const load = useCallback(async () => {
        setLoading(true);
        try {
          const { data: mrrData } = await supabase.from('v_mrr_summary').select('*');
          const { data: histData } = await supabase.from('v_monthly_revenue_summary').select('*').order('event_month', { ascending: true });
          
          const { data: clientsData, error } = await supabase.from('clients')
            .select(`
              *,
              leads (first_name, last_name, username)
            `)
            .order('created_at', { ascending: false });
          
          if (error) throw error;
          
          let summary = { mrr: 0, active: 0, arpc: 0, currency: 'USD' };
          if (mrrData && mrrData.length > 0) {
            const main = mrrData.find(m => m.currency === 'USD') || mrrData[0];
            summary = { mrr: main.total_mrr || 0, active: main.active_clients || 0, arpc: main.arpc || 0, currency: main.currency };
          }
          setMetrics(summary);
          setHistory(histData || []);
          setClients(clientsData || []);
        } catch (e) {
          showToast('Failed to load clients: ' + e.message, 'error');
        } finally {
          setLoading(false);
        }
      }, [showToast]);

      useEffect(() => { load(); }, [load]);

      if (loading) return <div className="center-load"><div className="spinner" /></div>;

      const fmt = new Intl.NumberFormat('en-US', { style: 'currency', currency: metrics?.currency || 'USD', maximumFractionDigits: 0 }).format;

      // Advanced Analytics Math
      let latestChurn = 0;
      let latestExpansion = 0;
      let latestContraction = 0;
      if (history.length > 0) {
         const last = history[0]; // descending order or ascending? We used ascending! So history[history.length - 1]
         const lastMonth = history[history.length - 1];
         latestChurn = lastMonth.churned_mrr || 0;
         latestExpansion = lastMonth.expansion_revenue || 0;
         latestContraction = lastMonth.contraction_revenue || 0;
      }
      
      const mrr = metrics?.mrr || 0;
      const arpc = metrics?.arpc || 0;
      const churnRatePct = mrr > 0 ? ((latestChurn / mrr) * 100).toFixed(1) : 0;
      
      const clientManualLtvs = clients.filter(c => c.estimated_ltv > 0).map(c => parseFloat(c.estimated_ltv));
      const hasRealChurn = parseFloat(churnRatePct) > 0;
      const ltv = clientManualLtvs.length > 0
        ? Math.round(clientManualLtvs.reduce((a, b) => a + b, 0) / clientManualLtvs.length)
        : (hasRealChurn ? Math.round(arpc / (parseFloat(churnRatePct) / 100)) : null);

      // NRR uses last month's collected revenue as starting base
      const lastCollected = history.length > 0 ? (history[history.length - 1].collected_revenue || 0) : 0;
      const nrrPct = lastCollected > 0 ? (((lastCollected + latestExpansion - latestContraction - latestChurn) / lastCollected) * 100).toFixed(1) : null;
      
      const maxCollected = Math.max(...history.map(h => h.collected_revenue || 0), 100);

      return (
        <div style={{ maxWidth: 1000, margin: '0 auto' }}>
          {eventClient && (
            <LogEventModal client={eventClient} showToast={showToast} onSuccess={() => { setEventClient(null); load(); }} onCancel={() => setEventClient(null)} />
          )}
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 20 }}>
            <h2 style={{ margin: 0, fontSize: 20, fontWeight: 700, letterSpacing: '-0.3px' }}>Active Clients & Revenue</h2>
            <button className="btn btn-primary" onClick={load}>Refresh Data</button>
          </div>
          
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4,1fr)', gap: 16, marginBottom: 16 }}>
             <div className="card" style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
                <span style={{ fontSize: 13, color: '#64748b', fontWeight: 600 }}>Total MRR</span>
                <span style={{ fontSize: 28, fontWeight: 700, color: '#0f172a' }}>{fmt(mrr)}</span>
             </div>
             <div className="card" style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
                <span style={{ fontSize: 13, color: '#64748b', fontWeight: 600 }}>Active Retainers</span>
                <span style={{ fontSize: 28, fontWeight: 700, color: '#0f172a' }}>{metrics?.active || 0}</span>
             </div>
             <div className="card" style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
                <span style={{ fontSize: 13, color: '#64748b', fontWeight: 600 }}>ARPC</span>
                <span style={{ fontSize: 28, fontWeight: 700, color: '#0f172a' }}>{fmt(arpc)}</span>
             </div>
             <div className="card" style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
                <span style={{ fontSize: 13, color: '#64748b', fontWeight: 600 }}>Annual Run Rate (ARR)</span>
                <span style={{ fontSize: 28, fontWeight: 700, color: '#16a34a' }}>{fmt(mrr * 12)}</span>
             </div>
          </div>

          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3,1fr)', gap: 16, marginBottom: 24 }}>
             <div className="card" style={{ display: 'flex', flexDirection: 'column', gap: 8, background: '#f8fafc', border: '1px dashed #cbd5e1' }}>
                <span style={{ fontSize: 13, color: '#64748b', fontWeight: 600 }}>Lifetime Value (LTV)</span>
                <span style={{ fontSize: 28, fontWeight: 700, color: ltv !== null ? '#0f172a' : '#94a3b8' }}>{ltv !== null ? fmt(ltv) : '\u2014'}</span>
                {ltv === null && <span style={{ fontSize: 11, color: '#94a3b8' }}>Set estimated LTV on clients or log churn events</span>}
             </div>
             <div className="card" style={{ display: 'flex', flexDirection: 'column', gap: 8, background: '#f8fafc', border: '1px dashed #cbd5e1' }}>
                <span style={{ fontSize: 13, color: '#64748b', fontWeight: 600 }}>Revenue Churn Rate</span>
                <span style={{ fontSize: 28, fontWeight: 700, color: '#ef4444' }}>{churnRatePct}%</span>
             </div>
             <div className="card" style={{ display: 'flex', flexDirection: 'column', gap: 8, background: '#f8fafc', border: '1px dashed #cbd5e1' }}>
                <span style={{ fontSize: 13, color: '#64748b', fontWeight: 600 }}>Net Revenue Retention (NRR)</span>
                <span style={{ fontSize: 28, fontWeight: 700, color: nrrPct === null ? '#94a3b8' : (parseFloat(nrrPct) >= 100 ? '#16a34a' : '#ef4444') }}>{nrrPct !== null ? `${nrrPct}%` : '\u2014'}</span>
                {nrrPct === null && <span style={{ fontSize: 11, color: '#94a3b8' }}>Log revenue events to calculate</span>}
             </div>
          </div>

          {history.length > 0 && (
            <div className="card" style={{ marginBottom: 24 }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 20 }}>
                <h3 style={{ margin: 0, fontSize: 15, fontWeight: 700, color: '#334155' }}>Monthly Revenue History</h3>
                <div style={{ display: 'flex', gap: 16, fontSize: 12, color: '#64748b' }}>
                  <span style={{ display: 'flex', alignItems: 'center', gap: 5 }}><span style={{ width: 10, height: 10, borderRadius: 2, background: '#3b82f6', display:'inline-block' }} /> Collected</span>
                  <span style={{ display: 'flex', alignItems: 'center', gap: 5 }}><span style={{ width: 10, height: 10, borderRadius: 2, background: '#22c55e', display:'inline-block' }} /> Expansion</span>
                  <span style={{ display: 'flex', alignItems: 'center', gap: 5 }}><span style={{ width: 10, height: 10, borderRadius: 2, background: '#ef4444', display:'inline-block' }} /> Churn</span>
                </div>
              </div>
              <div style={{ display: 'flex', alignItems: 'flex-end', gap: 10, height: 180, paddingBottom: 28, overflowX: 'auto', borderBottom: '1px solid #f1f5f9' }}>
                 {history.map((h, i) => {
                   const collected = h.collected_revenue || 0;
                   const expansion = h.expansion_revenue || 0;
                   const churn = h.churned_mrr || 0;
                   const contraction = h.contraction_revenue || 0;
                   const heightPct = (collected / maxCollected) * 100;
                   const fmtN = (n) => fmt(n);
                   const nrr = collected > 0 ? (((collected + expansion - contraction - churn) / (collected)) * 100).toFixed(0) : 100;
                   return (
                     <div key={i} className="chart-col">
                        <div className="chart-tooltip">
                          <div style={{ fontWeight: 700, borderBottom: '1px solid #334155', paddingBottom: 4, marginBottom: 4 }}>{h.event_month}</div>
                          <div>💰 Collected: <b>{fmtN(collected)}</b></div>
                          {expansion > 0 && <div style={{ color: '#86efac' }}>📈 Expansion: <b>+{fmtN(expansion)}</b></div>}
                          {contraction > 0 && <div style={{ color: '#fca5a5' }}>📉 Contraction: <b>-{fmtN(contraction)}</b></div>}
                          {churn > 0 && <div style={{ color: '#f87171' }}>❌ Churn: <b>-{fmtN(churn)}</b></div>}
                          <div style={{ borderTop: '1px solid #334155', paddingTop: 4, marginTop: 4 }}>NRR: <b style={{ color: parseInt(nrr) >= 100 ? '#86efac' : '#f87171' }}>{nrr}%</b></div>
                        </div>
                        <div className="chart-bar" style={{ height: `${Math.max(heightPct, 2)}%` }} />
                        <span style={{ position: 'absolute', bottom: -22, fontSize: 11, color: '#64748b', whiteSpace: 'nowrap', letterSpacing: '-0.2px' }}>{h.event_month.slice(5)}</span>
                     </div>
                   );
                 })}
              </div>
            </div>
          )}
          
          <div className="card" style={{ padding: 0, overflow: 'hidden' }}>
            <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 14 }}>
              <thead style={{ background: '#f8fafc', borderBottom: '1px solid #e2e8f0', color: '#475569' }}>
                <tr>
                  <th style={{ padding: '12px 16px', textAlign: 'left', fontWeight: 600 }}>Client</th>
                  <th style={{ padding: '12px 16px', textAlign: 'left', fontWeight: 600 }}>Type</th>
                  <th style={{ padding: '12px 16px', textAlign: 'left', fontWeight: 600 }}>Status</th>
                  <th style={{ padding: '12px 16px', textAlign: 'left', fontWeight: 600 }}>Value</th>
                  <th style={{ padding: '12px 16px', textAlign: 'left', fontWeight: 600 }}>Started</th>
                  <th style={{ padding: '12px 16px', textAlign: 'right', fontWeight: 600 }}>Actions</th>
                </tr>
              </thead>
              <tbody>
                {clients.length === 0 && (
                   <tr><td colSpan="6" style={{ padding: '24px', textAlign: 'center', color: '#64748b' }}>No clients mapped yet. Convert a lead to add one!</td></tr>
                )}
                {clients.map(c => {
                  const leadObj = Array.isArray(c.leads) ? c.leads[0] : c.leads;
                  const leadName = leadObj ? ([leadObj.first_name, leadObj.last_name].filter(Boolean).join(' ') || leadObj.username) : 'Unknown';
                  return (
                    <tr key={c.id} style={{ borderBottom: '1px solid #f1f5f9' }}>
                      <td style={{ padding: '12px 16px', fontWeight: 500 }}>
                        <a href="#" style={{ color: '#2563eb', textDecoration: 'none' }} onClick={(e) => { e.preventDefault(); c.leads && onOpenLead({...leadObj, id: c.telegram_id}); }}>{leadName}</a>
                      </td>
                      <td style={{ padding: '12px 16px', textTransform: 'capitalize' }}>{c.client_type}</td>
                      <td style={{ padding: '12px 16px' }}>
                        {c.client_type === 'retainer' && c.retainer_status === 'active' && <span style={{ background: '#dcfce7', color: '#166534', padding: '2px 8px', borderRadius: 12, fontSize: 12, fontWeight: 600 }}>Active</span>}
                        {c.client_type === 'retainer' && c.retainer_status === 'cancelled' && <span style={{ background: '#fee2e2', color: '#b91c1c', padding: '2px 8px', borderRadius: 12, fontSize: 12, fontWeight: 600 }}>Cancelled</span>}
                        {c.client_type !== 'retainer' && <span style={{ color: '#94a3b8' }}>—</span>}
                      </td>
                      <td style={{ padding: '12px 16px', fontWeight: 600 }}>
                         {c.retainer_amount > 0 ? `${c.retainer_amount} ${c.currency}` : '—'}
                      </td>
                      <td style={{ padding: '12px 16px', color: '#64748b' }}>
                         {c.retainer_start_date || '—'}
                      </td>
                      <td style={{ padding: '12px 16px', textAlign: 'right' }}>
                         <button className="btn" style={{ fontSize: 13, padding: '4px 10px', borderColor: '#cbd5e1' }} onClick={() => setEventClient(c)}>Log Event</button>
                      </td>
                    </tr>
                  )
                })}
              </tbody>
            </table>
          </div>
        </div>
      );
    }

    function App() {
      const [authed, setAuthed] = useState(sessionStorage.getItem('crm_auth') === '1');
      const [tab, setTab] = useState('dashboard');
      const [search, setSearch] = useState('');
      const [debouncedSearch, setDebouncedSearch] = useState('');
      const [selectedLead, setSelectedLead] = useState(null);
      const [refreshKey, setRefreshKey] = useState(0);
      const [newLeadsCount, setNewLeadsCount] = useState(0);
      const [showAI, setShowAI] = useState(false);
      const [toastEl, showToast] = useToast();

      useEffect(() => {
        const t = setTimeout(() => setDebouncedSearch(search), 300);
        return () => clearTimeout(t);
      }, [search]);

      useEffect(() => {
        if (!authed) return;
        (async () => {
          try {
            const since = new Date(Date.now() - 24 * 3600 * 1000).toISOString();
            const { count } = await supabase.from('leads').select('*', { count: 'exact', head: true }).gte('created_at', since);
            setNewLeadsCount(count || 0);
          } catch { }
        })();
      }, [authed, refreshKey]);

      if (!authed) return <Login onSuccess={() => setAuthed(true)} />;

      const NavIcon = ({ d, d2 }) => (
        <svg className="nav-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <path d={d} />{d2 && <path d={d2} />}
        </svg>
      );

      return (
        <div className="app">
          <div className="sidebar">
            <div className="logo">MQ<span>.</span>SD</div>
            <div className="nav">
              <a className={tab === 'dashboard' ? 'active' : ''} onClick={() => setTab('dashboard')}>
                <svg className="nav-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
                <span>Dashboard</span>
              </a>
              <a className={tab === 'leads' ? 'active' : ''} onClick={() => setTab('leads')}>
                <svg className="nav-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                <span>Leads</span>
              </a>
              <a className={tab === 'pipeline' ? 'active' : ''} onClick={() => setTab('pipeline')}>
                <svg className="nav-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 12H2"/><path d="M5 12V4"/><path d="M9 12V8"/><path d="M13 12V10"/><path d="M17 12V6"/><path d="M21 12V2"/></svg>
                <span>Pipeline</span>
              </a>
              <a className={tab === 'clients' ? 'active' : ''} onClick={() => setTab('clients')}>
                <svg className="nav-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                <span>Clients</span>
              </a>
              <a className={tab === 'metrics' ? 'active' : ''} onClick={() => setTab('metrics')}>
                <svg className="nav-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
                <span>Metrics</span>
              </a>
              <a className={tab === 'campaigns' ? 'active' : ''} onClick={() => setTab('campaigns')}>
                <svg className="nav-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
                <span>Campaigns</span>
              </a>
              <a className={tab === 'settings' ? 'active' : ''} onClick={() => setTab('settings')}>
                <svg className="nav-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                <span>Settings</span>
              </a>
            </div>
            <div className="sidebar-footer">MQSD CRM v2</div>
          </div>

          <div className="main">
            <div className="topbar">
              <input
                className="search"
                placeholder="Search leads by name, username, or phone..."
                value={search}
                onChange={e => setSearch(e.target.value)}
              />
              <div className="topbar-right">
                {newLeadsCount > 0 && <span className="badge-new">{newLeadsCount} new</span>}
                <button className="ai-toggle-btn" onClick={() => setShowAI(s => !s)}>Ask AI</button>
                <button className="btn" onClick={() => setRefreshKey(k => k + 1)}>Refresh</button>
                <button className="btn" onClick={() => { sessionStorage.removeItem('crm_auth'); location.reload(); }}>Logout</button>
              </div>
            </div>

            <div className="content">
              {tab === 'dashboard' && <Dashboard showToast={showToast} refreshKey={refreshKey} />}
              {tab === 'leads' && <LeadsTable showToast={showToast} refreshKey={refreshKey} search={debouncedSearch} onOpenLead={setSelectedLead} />}
              {tab === 'pipeline' && <Kanban showToast={showToast} refreshKey={refreshKey} onOpenLead={setSelectedLead} />}
              {tab === 'clients' && <ClientsTab showToast={showToast} onOpenLead={setSelectedLead} />}
              {tab === 'metrics' && <MetricsDashboard showToast={showToast} />}
              {tab === 'campaigns' && <CampaignsTab showToast={showToast} />}
              {tab === 'settings' && <Settings showToast={showToast} />}
            </div>
          </div>

          {selectedLead && (
            <LeadPanel
              lead={selectedLead}
              onClose={() => setSelectedLead(null)}
              showToast={showToast}
              onUpdated={() => setRefreshKey(k => k + 1)}
            />
          )}
          <AskAI open={showAI} onClose={() => setShowAI(false)} />
          {toastEl}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>

</html>
