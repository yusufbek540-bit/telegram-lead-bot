    // Leads Table
    function LeadsTable({ showToast, refreshKey, search, onOpenLead }) {
      const [leads, setLeads] = useState([]);
      const [loading, setLoading] = useState(true);
      const [unreadTids, setUnreadTids] = useState(new Set());
      const [statusFilter, setStatusFilter] = useState('all');
      const [sourceFilter, setSourceFilter] = useState('all');
      const [assignedFilter, setAssignedFilter] = useState('all');
      const [bizTypeFilter, setBizTypeFilter] = useState('all');
      const [budgetFilter, setBudgetFilter] = useState('all');
      const [qualFilter, setQualFilter] = useState('all');
      const [hasPhoneOnly, setHasPhoneOnly] = useState(false);
      const [sortBy, setSortBy] = useState('created_at');
      const [sortDir, setSortDir] = useState('desc');
      const [page, setPage] = useState(1);
      const PER_PAGE = 25;

      const load = useCallback(async () => {
        setLoading(true);
        try {
          const { data, error } = await supabase.from('leads').select('*, lead_tags(tag, confidence, source)').order('created_at', { ascending: false });
          if (error) throw error;
          
          // Fetch unread status
          const { data: unreadRows } = await supabase.from('conversations').select('telegram_id').eq('is_read', false);
          setUnreadTids(new Set((unreadRows || []).map(r => r.telegram_id)));
          
          setLeads(data || []);
        } catch (e) {
          showToast('Failed to load leads: ' + e.message, 'error');
        } finally {
          setLoading(false);
        }
      }, [showToast]);

      useEffect(() => {
        load();
        
        const channel = supabase.channel('global-chat-events')
          .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'conversations' }, (payload) => {
            if (payload.new.role === 'user') {
              setUnreadTids(prev => new Set([...prev, payload.new.telegram_id]));
            }
          })
          .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'conversations' }, (payload) => {
            if (payload.new.is_read) {
              setUnreadTids(prev => {
                const n = new Set(prev);
                n.delete(payload.new.telegram_id);
                return n;
              });
            }
          })
          .subscribe();
          
        return () => { supabase.removeChannel(channel); };
      }, [load, refreshKey]);

      const sources = useMemo(() => [...new Set(leads.map(l => l.source).filter(Boolean))], [leads]);
      const assignees = useMemo(() => [...new Set(leads.map(l => l.assigned_to).filter(Boolean))], [leads]);

      const filtered = useMemo(() => {
        let out = leads;
        if (statusFilter !== 'all') out = out.filter(l => l.status === statusFilter);
        if (sourceFilter !== 'all') out = out.filter(l => l.source === sourceFilter);
        if (assignedFilter !== 'all') out = out.filter(l => l.assigned_to === assignedFilter);
        if (bizTypeFilter !== 'all') out = out.filter(l => l.business_type === bizTypeFilter);
        if (budgetFilter !== 'all') out = out.filter(l => l.budget_range === budgetFilter);
        if (qualFilter !== 'all') {
          if (qualFilter === 'completed') out = out.filter(l => l.questionnaire_completed);
          else if (qualFilter === 'partial') out = out.filter(l => !l.questionnaire_completed && l.questionnaire_step > 0);
          else if (qualFilter === 'none') out = out.filter(l => (l.questionnaire_step || 0) === 0);
        }
        if (hasPhoneOnly) out = out.filter(l => l.phone);
        if (search) {
          const s = search.toLowerCase();
          out = out.filter(l =>
            (l.first_name || '').toLowerCase().includes(s) ||
            (l.last_name || '').toLowerCase().includes(s) ||
            (l.username || '').toLowerCase().includes(s) ||
            (l.phone || '').toLowerCase().includes(s)
          );
        }
        out = [...out].sort((a, b) => {
          let va = a[sortBy], vb = b[sortBy];
          if (va == null) va = '';
          if (vb == null) vb = '';
          if (va < vb) return sortDir === 'asc' ? -1 : 1;
          if (va > vb) return sortDir === 'asc' ? 1 : -1;
          return 0;
        });
        return out;
      }, [leads, statusFilter, sourceFilter, assignedFilter, hasPhoneOnly, search, sortBy, sortDir]);

      const totalPages = Math.ceil(filtered.length / PER_PAGE) || 1;
      const pageLeads = filtered.slice((page - 1) * PER_PAGE, page * PER_PAGE);

      useEffect(() => { setPage(1); }, [statusFilter, sourceFilter, assignedFilter, bizTypeFilter, budgetFilter, qualFilter, hasPhoneOnly, search]);

      const toggleSort = col => {
        if (sortBy === col) setSortDir(d => d === 'asc' ? 'desc' : 'asc');
        else { setSortBy(col); setSortDir('asc'); }
      };

      if (loading) return <div className="center-load"><div className="spinner" /></div>;

      return (
        <div>
          <div className="filters-bar">
            <select value={statusFilter} onChange={e => setStatusFilter(e.target.value)}>
              <option value="all">All Statuses</option>
              {STATUSES.map(s => <option key={s} value={s}>{STATUS_LABELS[s]}</option>)}
            </select>
            <select value={sourceFilter} onChange={e => setSourceFilter(e.target.value)}>
              <option value="all">All Sources</option>
              {sources.map(s => <option key={s} value={s}>{s}</option>)}
            </select>
            <select value={assignedFilter} onChange={e => setAssignedFilter(e.target.value)}>
              <option value="all">All Assignees</option>
              {assignees.map(a => <option key={a} value={a}>{a}</option>)}
            </select>
            <select value={bizTypeFilter} onChange={e => setBizTypeFilter(e.target.value)}>
              <option value="all">Business Type</option>
              {BIZ_TYPES.map(t => <option key={t} value={t}>{t}</option>)}
            </select>
            <select value={budgetFilter} onChange={e => setBudgetFilter(e.target.value)}>
              <option value="all">Budget</option>
              {Object.keys(BUDGET_LABELS).map(b => <option key={b} value={b}>{BUDGET_LABELS[b]}</option>)}
            </select>
            <select value={qualFilter} onChange={e => setQualFilter(e.target.value)}>
              <option value="all">Questionnaire</option>
              <option value="completed">Completed</option>
              <option value="partial">Partial</option>
              <option value="none">Not Started</option>
            </select>
            <label style={{ display: 'flex', alignItems: 'center', gap: 6, whiteSpace: 'nowrap' }}>
              <input type="checkbox" checked={hasPhoneOnly} onChange={e => setHasPhoneOnly(e.target.checked)} />
              Has Phone
            </label>
            <div style={{ marginLeft: 'auto', color: '#64748b', fontSize: 13 }}>
              {filtered.length} results
            </div>
          </div>

          <div className="card" style={{ padding: 0 }}>
            <table>
              <thead>
                <tr>
                  <th onClick={() => toggleSort('first_name')}>Name</th>
                  <th onClick={() => toggleSort('phone')}>Phone</th>
                  <th onClick={() => toggleSort('source')}>Source</th>
                  <th onClick={() => toggleSort('business_type')}>Type</th>
                  <th onClick={() => toggleSort('budget_range')}>Budget</th>
                  <th onClick={() => toggleSort('status')}>Status</th>
                  <th onClick={() => toggleSort('lead_score')}>Score</th>
                  <th onClick={() => toggleSort('assigned_to')}>Assigned</th>
                  <th onClick={() => toggleSort('updated_at')}>Last Activity</th>
                  <th onClick={() => toggleSort('created_at')}>Created</th>
                </tr>
              </thead>
              <tbody>
                {pageLeads.map(l => {
                  const isUnread = unreadTids.has(l.telegram_id);
                  return (
                    <tr key={l.id} className={`lead-row ${isUnread ? 'unread' : ''}`} onClick={() => onOpenLead(l)} style={isStale(l) ? { borderLeft: '3px solid #ef4444', background: isUnread ? '#fef2f2' : '#fff5f5' } : {}}>
                      <td>
                        <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
                          {isUnread && <span className="unread-indicator" title="New message"></span>}
                          <span>{[l.first_name, l.last_name].filter(Boolean).join(' ') || l.username || '—'}</span>
                          {(() => { const b = responseTimeBadge(l); return b ? <span style={{ marginLeft: 6, fontSize: 11, color: b.color }} title={b.title}>{b.text}</span> : null; })()}
                        </div>
                      </td>
                      <td>{l.phone || '—'}</td>
                      <td>{l.source || '—'}</td>
                      <td title={l.business_type}>{BIZ_ICONS[l.business_type] || '—'}</td>
                      <td>
                        {l.budget_range ? (
                          <span className="status-badge" style={{ background: BUDGET_COLORS[l.budget_range] || '#94a3b8', fontSize: 10 }}>
                            {BUDGET_LABELS[l.budget_range] || l.budget_range}
                          </span>
                        ) : '—'}
                      </td>
                      <td><span className="status-badge" style={{ background: STATUS_COLORS[l.status] || '#94a3b8' }}>{STATUS_LABELS[l.status] || l.status}</span></td>
                      <td><span className="score-badge" style={{ color: scoreColor(l.lead_score) }}>{l.lead_score ?? 0}</span></td>
                      <td>{l.assigned_to || '—'}</td>
                      <td>{timeAgo(l.updated_at)}</td>
                      <td>{formatDate(l.created_at)}</td>
                    </tr>
                  );
                })}
                {pageLeads.length === 0 && <tr><td colSpan="8" className="empty">No leads found</td></tr>}
              </tbody>
            </table>
            <div className="pagination">
              <span style={{ color: '#64748b', fontSize: 13 }}>
                Showing {filtered.length === 0 ? 0 : (page - 1) * PER_PAGE + 1}–{Math.min(page * PER_PAGE, filtered.length)} of {filtered.length}
              </span>
              <div style={{ display: 'flex', gap: 8 }}>
                <button className="btn" disabled={page === 1} onClick={() => setPage(p => p - 1)}>Prev</button>
                <span style={{ padding: '8px 0' }}>{page} / {totalPages}</span>
                <button className="btn" disabled={page >= totalPages} onClick={() => setPage(p => p + 1)}>Next</button>
              </div>
            </div>
          </div>
        </div>
      );
    }

    function ClientConversionModal({ lead, onSuccess, onCancel, showToast }) {
      const [type, setType] = useState('retainer');
      const [amount, setAmount] = useState('');
      const [currency, setCurrency] = useState(lead.deal_currency || 'USD');
      const [startDate, setStartDate] = useState(new Date().toISOString().split('T')[0]);
      const [estLtv, setEstLtv] = useState('');
      const [saving, setSaving] = useState(false);

      const save = async () => {
        setSaving(true);
        try {
          const { data: existingRec } = await supabase.from('clients').select('id').eq('telegram_id', lead.telegram_id).maybeSingle();
          const insertData = {
            telegram_id: lead.telegram_id,
            client_type: type,
            retainer_amount: type === 'retainer' ? (amount || 0) : null,
            retainer_start_date: type === 'retainer' ? startDate : null,
            retainer_status: type === 'retainer' ? 'active' : null,
            currency: currency,
          };
          if (estLtv) insertData.estimated_ltv = parseFloat(estLtv);
          const { error } = await supabase.from('clients').upsert(insertData, { onConflict: 'telegram_id', ignoreDuplicates: false });
          if (error) throw error;

          if (!existingRec && (type === 'retainer' || type === 'one-time' || type === 'project')) {
             // Let's create an initial 'new_retainer' or 'one_time_fee' revenue event to start the MRR / revenue collection immediately if they have an amount
             if (amount && Number(amount) > 0) {
               await supabase.from('revenue_events').insert({
                 telegram_id: lead.telegram_id,
                 event_date: startDate,
                 event_month: startDate.substring(0, 7),
                 amount: amount,
                 currency: currency,
                 event_type: type === 'retainer' ? 'new_retainer' : 'one_time_fee',
                 notes: 'Initial close'
               });
             }
          }
          
          showToast('Client mapped successfully', 'success');
          onSuccess();
        } catch (err) {
          showToast('Error saving client: ' + err.message, 'error');
        } finally {
          setSaving(false);
        }
      };

      return (
        <div className="panel-overlay" style={{ zIndex: 9999 }}>
          <div className="panel" style={{ width: 450, margin: '10vh auto', height: 'max-content', padding: 0 }}>
            <div className="panel-header" style={{ padding: '20px 24px', borderBottom: '1px solid #e2e8f0' }}>
              <h2 style={{ fontSize: 18, margin: 0 }}>Convert to Client</h2>
              <button className="btn" onClick={onCancel} style={{ border: 'none', background: 'none', fontSize: 18 }}>✕</button>
            </div>
            <div className="panel-section" style={{ padding: 24, border: 'none' }}>
              <p style={{marginBottom: 20, fontSize: 14, color: '#64748b'}}>Set up billing details for <b>{[lead.first_name, lead.last_name].filter(Boolean).join(' ') || lead.username || 'this lead'}</b> to start tracking MRR.</p>
              
              <div className="form-group" style={{ marginBottom: 16 }}>
                <label style={{ display: 'block', fontSize: 13, fontWeight: 600, color: '#334155', marginBottom: 6 }}>Client Type</label>
                <select value={type} onChange={e => setType(e.target.value)} style={{ width: '100%', padding: '10px 12px', border: '1px solid #cbd5e1', borderRadius: 6, fontSize: 14 }}>
                  <option value="retainer">Retainer (Recurring MRR)</option>
                  <option value="project">Project-based</option>
                  <option value="one-time">One-time Service</option>
                </select>
              </div>
              
              <div className="form-group" style={{ marginBottom: 16 }}>
                <label style={{ display: 'block', fontSize: 13, fontWeight: 600, color: '#334155', marginBottom: 6 }}>
                  {type === 'retainer' ? 'Monthly Retainer Value' : 'Deal Value (Optional)'}
                </label>
                <div style={{ display: 'flex', gap: 8 }}>
                  <input type="number" min="0" value={amount} onChange={e => setAmount(e.target.value)} placeholder="e.g. 500" style={{ flex: 1, padding: '10px 12px', border: '1px solid #cbd5e1', borderRadius: 6, fontSize: 14 }} />
                  <select value={currency} onChange={e => setCurrency(e.target.value)} style={{ width: 90, padding: '10px 12px', border: '1px solid #cbd5e1', borderRadius: 6, fontSize: 14 }}>
                    <option value="USD">USD</option>
                    <option value="UZS">UZS</option>
                  </select>
                </div>
              </div>
              
              <div className="form-group" style={{ marginBottom: 16 }}>
                <label style={{ display: 'block', fontSize: 13, fontWeight: 600, color: '#334155', marginBottom: 6 }}>Start Date</label>
                <input type="date" value={startDate} onChange={e => setStartDate(e.target.value)} style={{ width: '100%', padding: '10px 12px', border: '1px solid #cbd5e1', borderRadius: 6, fontSize: 14 }} />
              </div>

              <div className="form-group" style={{ marginBottom: 24 }}>
                <label style={{ display: 'block', fontSize: 13, fontWeight: 600, color: '#334155', marginBottom: 6 }}>
                  Estimated LTV <span style={{ fontWeight: 400, color: '#94a3b8' }}>(optional)</span>
                </label>
                <p style={{ fontSize: 12, color: '#94a3b8', margin: '0 0 6px 0' }}>How much total revenue do you expect from this client over their lifetime?</p>
                <div style={{ display: 'flex', gap: 8 }}>
                  <input type="number" min="0" value={estLtv} onChange={e => setEstLtv(e.target.value)} placeholder={type === 'retainer' && amount ? `e.g. ${Math.round(amount * 12)}` : 'e.g. 6000'}
                    style={{ flex: 1, padding: '10px 12px', border: '1px solid #cbd5e1', borderRadius: 6, fontSize: 14 }} />
                  <span style={{ padding: '10px 12px', background: '#f8fafc', border: '1px solid #cbd5e1', borderRadius: 6, fontSize: 14, color: '#64748b' }}>{currency}</span>
                </div>
              </div>

              <div style={{ display: 'flex', gap: 12, marginTop: 32 }}>
                <button className="btn" style={{ flex: 1, padding: '10px 0', fontSize: 14 }} onClick={onCancel}>Cancel Conversion</button>
                <button className="btn btn-primary" style={{ flex: 1, padding: '10px 0', fontSize: 14 }} disabled={saving || (type==='retainer' && !amount)} onClick={save}>
                  {saving ? 'Saving...' : 'Save & Convert'}
                </button>
              </div>
            </div>
          </div>
        </div>
      );
    }

    function LostReasonModal({ lead, onConfirm, onCancel, showToast }) {
      const [reason, setReason] = useState('');
      const [customReason, setCustomReason] = useState('');
      const [reasons, setReasons] = useState([]);
      const [notes, setNotes] = useState('');

      React.useEffect(() => {
        supabase.from('rejection_reasons').select('label').order('sort_order').then(({ data }) => {
          setReasons((data || []).map(r => r.label));
        });
      }, []);

      const leadName = [lead.first_name, lead.last_name].filter(Boolean).join(' ') || lead.username || 'this lead';

      return (
        <div className="panel-overlay" style={{ zIndex: 9999 }}>
          <div className="panel" style={{ width: 450, margin: '10vh auto', height: 'max-content', padding: 0 }}>
            <div className="panel-header" style={{ padding: '20px 24px', borderBottom: '1px solid #e2e8f0' }}>
              <h2 style={{ fontSize: 18, margin: 0, color: '#dc2626' }}>Mark as Lost</h2>
              <button className="btn" onClick={onCancel} style={{ border: 'none', background: 'none', fontSize: 18 }}>✕</button>
            </div>
            <div className="panel-section" style={{ padding: 24, border: 'none' }}>
              <p style={{ marginBottom: 20, fontSize: 14, color: '#64748b' }}>Why was <b>{leadName}</b> lost? This helps track patterns and improve conversion.</p>

              <div className="form-group" style={{ marginBottom: 16 }}>
                <label style={{ display: 'block', fontSize: 13, fontWeight: 600, color: '#334155', marginBottom: 6 }}>Reason</label>
                <select value={reason} onChange={e => setReason(e.target.value)} style={{ width: '100%', padding: '10px 12px', border: '1px solid #cbd5e1', borderRadius: 6, fontSize: 14 }}>
                  <option value="">— Select reason —</option>
                  {reasons.map(r => <option key={r} value={r}>{r}</option>)}
                  <option value="__custom">Other (custom)</option>
                </select>
              </div>

              {reason === '__custom' && (
                <div className="form-group" style={{ marginBottom: 16 }}>
                  <label style={{ display: 'block', fontSize: 13, fontWeight: 600, color: '#334155', marginBottom: 6 }}>Custom Reason</label>
                  <input value={customReason} onChange={e => setCustomReason(e.target.value)} placeholder="Enter reason..."
                    style={{ width: '100%', padding: '10px 12px', border: '1px solid #cbd5e1', borderRadius: 6, fontSize: 14, boxSizing: 'border-box' }} />
                </div>
              )}

              <div className="form-group" style={{ marginBottom: 20 }}>
                <label style={{ display: 'block', fontSize: 13, fontWeight: 600, color: '#334155', marginBottom: 6 }}>Notes (optional)</label>
                <textarea value={notes} onChange={e => setNotes(e.target.value)} placeholder="Any additional context..."
                  rows="2" style={{ width: '100%', padding: '10px 12px', border: '1px solid #cbd5e1', borderRadius: 6, fontSize: 14, fontFamily: 'inherit', resize: 'vertical', boxSizing: 'border-box' }} />
              </div>

              <div style={{ display: 'flex', gap: 10 }}>
                <button className="btn" style={{ flex: 1, padding: '10px 0', fontSize: 14 }} onClick={onCancel}>Cancel</button>
                <button className="btn" style={{ flex: 1, padding: '10px 0', fontSize: 14, background: '#dc2626', color: '#fff', border: 'none', borderRadius: 6 }}
                  disabled={!reason || (reason === '__custom' && !customReason.trim())}
                  onClick={() => {
                    const finalReason = reason === '__custom' ? customReason.trim() : reason;
                    onConfirm(finalReason, notes.trim());
                  }}>
                  Mark as Lost
                </button>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // Lead Detail Panel
    function LeadPanel({ lead, onClose, showToast, onUpdated }) {
      const [status, setStatus] = useState(lead.status || 'new');
      const [rejection, setRejection] = useState(lead.rejection_reason || '');
      const [assigned, setAssigned] = useState(lead.assigned_to || '');
      const [followup, setFollowup] = useState(lead.next_followup_at ? lead.next_followup_at.slice(0, 16) : '');
      const [followupNote, setFollowupNote] = useState(lead.followup_note || '');
      const [saving, setSaving] = useState(false);
      const [showScoreBreakdown, setShowScoreBreakdown] = useState(false);
      const [dealValue, setDealValue] = useState(lead.deal_value != null ? String(lead.deal_value) : '');
      const [dealCurrency, setDealCurrency] = useState(lead.deal_currency || 'USD');
      const [proposals, setProposals] = useState([]);
      const [showProposalForm, setShowProposalForm] = useState(false);
      const [propTitle, setPropTitle] = useState('');
      const [propAmount, setPropAmount] = useState('');
      const [propCurrency, setPropCurrency] = useState('USD');
      const [propValidUntil, setPropValidUntil] = useState('');
      const [savingProposal, setSavingProposal] = useState(false);
      const [teamMembers, setTeamMembers] = useState([]);
      const [rejectionReasons, setRejectionReasons] = useState([]);
      
      const [clientData, setClientData] = useState(null);
      const [editingClient, setEditingClient] = useState(false);
      const [cType, setCType] = useState('retainer');
      const [cAmount, setCAmount] = useState('');
      const [cCurrency, setCCurrency] = useState('USD');
      const [cStatus, setCStatus] = useState('active');
      const [cLtv, setCLtv] = useState('');
      const [savingClient, setSavingClient] = useState(false);

      const [msgInput, setMsgInput] = useState('');
      const [sendingMsg, setSendingMsg] = useState(false);

      React.useEffect(() => { getTeamMembers().then(setTeamMembers); }, []);
      React.useEffect(() => {
        supabase.from('rejection_reasons').select('label').order('sort_order').then(({ data }) => {
          setRejectionReasons((data || []).map(r => r.label));
        });
      }, []);

      const [convo, setConvo] = useState([]);
      const [events, setEvents] = useState([]);
      const [comments, setComments] = useState([]);
      const [history, setHistory] = useState([]);
      const [newComment, setNewComment] = useState('');
      const [tags, setTags] = useState([]);

      const loadDetails = useCallback(async () => {
        // Each query is independent — one missing table won't blank the entire panel
        const safe = async (promise) => { try { const r = await promise; return r.data || []; } catch { return []; } };
        const [c, e, cm, h, pr, lt, cl] = await Promise.all([
          safe(supabase.from('conversations').select('*').eq('telegram_id', lead.telegram_id).order('created_at', { ascending: true })),
          safe(supabase.from('events').select('*').eq('telegram_id', lead.telegram_id).order('created_at', { ascending: false })),
          safe(supabase.from('comments').select('*').eq('telegram_id', lead.telegram_id).order('is_pinned', { ascending: false }).order('created_at', { ascending: true })),
          safe(supabase.from('status_history').select('*').eq('telegram_id', lead.telegram_id).order('created_at', { ascending: false })),
          safe(supabase.from('proposals').select('*').eq('telegram_id', lead.telegram_id).order('created_at', { ascending: false })),
          safe(supabase.from('lead_tags').select('tag, confidence, source').eq('telegram_id', lead.telegram_id)),
          safe(supabase.from('clients').select('*').eq('telegram_id', lead.telegram_id).limit(1)),
        ]);
        setConvo(c);
        setEvents(e);
        setComments(cm);
        setHistory(h);
        setProposals(pr);
        setTags(lt);
        if (cl.length > 0) {
          setClientData(cl[0]);
          setCType(cl[0].client_type || 'retainer');
          setCAmount(cl[0].retainer_amount ? String(cl[0].retainer_amount) : '');
          setCCurrency(cl[0].currency || 'USD');
          setCStatus(cl[0].retainer_status || 'active');
          setCLtv(cl[0].estimated_ltv ? String(cl[0].estimated_ltv) : '');
        }
        // Mark messages as read (best-effort) — no onUpdated here; that only fires on user saves
        try { await supabase.from('conversations').update({ is_read: true }).eq('telegram_id', lead.telegram_id).eq('is_read', false); } catch {}
      }, [lead.telegram_id]);

      useEffect(() => {
        loadDetails();
        
        // Setup Realtime subscription for live chat
        const channel = supabase.channel(`chat-${lead.telegram_id}`)
          .on('postgres_changes', { 
            event: 'INSERT', 
            schema: 'public', 
            table: 'conversations',
            filter: `telegram_id=eq.${lead.telegram_id}`
          }, (payload) => {
            setConvo(prev => [...prev, payload.new]);
            if (payload.new.role === 'user') {
              supabase.from('conversations').update({ is_read: true }).eq('id', payload.new.id).execute();
            }
          })
          .on('postgres_changes', {
            event: 'UPDATE', 
            schema: 'public', 
            table: 'conversations',
            filter: `telegram_id=eq.${lead.telegram_id}`
          }, (payload) => {
            setConvo(prev => prev.map(m => m.id === payload.new.id ? payload.new : m));
          })
          .subscribe();

        return () => { supabase.removeChannel(channel); };
      }, [lead.telegram_id, loadDetails]);

      const sendMessage = async () => {
        if (!msgInput.trim()) return;
        const text = msgInput.trim();
        setSendingMsg(true);
        const optimistic = { id: `temp-${Date.now()}`, telegram_id: lead.telegram_id, role: 'assistant', message: text, is_sent: false, is_read: true, created_at: new Date().toISOString() };
        setConvo(prev => [...prev, optimistic]);
        setMsgInput('');
        try {
          const { data, error } = await supabase.from('conversations').insert({
            telegram_id: lead.telegram_id,
            role: 'assistant',
            message: text,
            is_sent: false,
            is_read: true
          }).select().single();
          if (error) throw error;
          setConvo(prev => prev.map(m => m.id === optimistic.id ? data : m));
        } catch (err) {
          setConvo(prev => prev.filter(m => m.id !== optimistic.id));
          showToast('Failed to send message', 'error');
        } finally {
          setSendingMsg(false);
        }
      };
      
      const [conversionLead, setConversionLead] = useState(null);
      const [lostModal, setLostModal] = useState(false);
      const [lostNotes, setLostNotes] = useState(lead.lost_notes || '');

      const save = async () => {
        if (status === 'converted' && lead.status !== 'converted' && !clientData) {
          setConversionLead(true);
          return;
        }
        if (status === 'lost' && lead.status !== 'lost') {
          setLostModal(true);
          return;
        }
        executeSave();
      };

      const executeSave = async (overrides = {}) => {
        setSaving(true);
        const finalRejection = overrides.rejection_reason !== undefined ? overrides.rejection_reason : rejection;
        const finalLostNotes = overrides.lost_notes !== undefined ? overrides.lost_notes : lostNotes;
        try {
          const fullReason = status === 'lost'
            ? [finalRejection, finalLostNotes].filter(Boolean).join(' — ') || null
            : null;
          const updates = {
            status,
            assigned_to: assigned || null,
            next_followup_at: followup || null,
            followup_note: followupNote || null,
            rejection_reason: fullReason,
            deal_value: dealValue !== '' ? parseFloat(dealValue) : null,
            deal_currency: dealCurrency,
            updated_at: new Date().toISOString(),
          };
          // Record first contact time when status moves away from 'new' for the first time
          if (lead.status === 'new' && status !== 'new' && !lead.first_contact_at) {
            updates.first_contact_at = new Date().toISOString();
          }
          const { error } = await supabase.from('leads').update(updates).eq('id', lead.id);
          if (error) throw error;
          const leadName = `${lead.first_name || ''} ${lead.last_name || ''}`.trim() || lead.username || 'Unknown';
          if (status !== lead.status) {
            await supabase.from('status_history').insert({
              telegram_id: lead.telegram_id,
              old_status: lead.status, new_status: status,
              changed_by: getCrmUserName() || 'CRM',
            });
            const rejectionReason = status === 'lost' ? (fullReason || '') : '';
            const changer = getCrmUserName() || 'CRM';
            const statusMsg = `🔄 Статус изменён\n\nЛид: <b>${leadName}</b>\nНовый статус: <b>${STATUS_LABELS[status] || status}</b>${rejectionReason ? `\nПричина: ${rejectionReason}` : ''}\nИзменил: ${changer}`;
            await notifyAdmins(statusMsg);
          }
          const newAssignedTo = assigned || '';
          const origAssignedTo = lead.assigned_to || '';
          if (newAssignedTo && newAssignedTo !== origAssignedTo) {
            const teamMembers = await getTeamMembers();
            const member = teamMembers.find(m => m.name === newAssignedTo);
            if (member && member.telegram_id) {
              const phone = lead.phone || '—';
              const score = lead.lead_score || 0;
              const source = lead.source || '—';
              const assignMsg = `📋 Вам назначен лид!\n\nИмя: <b>${leadName}</b>\nТелефон: ${phone}\nИсточник: ${source}\nБаллы: ${score}\n\nНазначил: CRM`;
              await notifyTelegram(member.telegram_id, assignMsg);
            }
            await notifyAdmins(`👤 Лид назначен\n\nЛид: <b>${leadName}</b>\nНазначен: ${newAssignedTo}`);
          }
          showToast('Saved', 'success');
          onUpdated();
          loadDetails();
        } catch (err) {
          showToast('Save failed: ' + err.message, 'error');
        } finally {
          setSaving(false);
        }
      };

      const createProposal = async () => {
        if (!propTitle.trim()) { showToast('Title required', 'error'); return; }
        const amt = parseFloat(propAmount);
        if (!amt || amt <= 0) { showToast('Valid amount required', 'error'); return; }
        if (!propValidUntil) { showToast('Valid until date required', 'error'); return; }
        setSavingProposal(true);
        try {
          const { error } = await supabase.from('proposals').insert({
            telegram_id: lead.telegram_id,
            title: propTitle.trim(),
            amount: amt,
            currency: propCurrency,
            valid_until: propValidUntil,
            status: 'sent',
            created_by: getCrmUserName() || 'CRM',
          });
          if (error) throw error;
          setPropTitle(''); setPropAmount(''); setPropValidUntil('');
          setShowProposalForm(false);
          showToast('Proposal created', 'success');
          loadDetails();
        } catch (err) {
          showToast('Failed: ' + err.message, 'error');
        } finally {
          setSavingProposal(false);
        }
      };

      const updateProposalStatus = async (proposalId, newStatus) => {
        const { error } = await supabase.from('proposals')
          .update({ status: newStatus, updated_at: new Date().toISOString() })
          .eq('id', proposalId);
        if (error) { showToast('Update failed', 'error'); return; }
        showToast('Proposal updated', 'success');
        loadDetails();
      };

      const addComment = async () => {
        if (!newComment.trim()) return;
        try {
          const commentText = newComment.trim();
          const author = getCrmUserName() || 'CRM';
          const { error } = await supabase.from('comments').insert({
            telegram_id: lead.telegram_id,
            author,
            content: commentText,
            is_pinned: false,
          });
          if (error) throw error;
          const leadName = `${lead.first_name || ''} ${lead.last_name || ''}`.trim() || lead.username || 'Unknown';
          const msg = `💬 Новый комментарий\n\nЛид: <b>${leadName}</b>\nАвтор: ${author}\nКомментарий: ${commentText}`;
          await notifyAdmins(msg);
          setNewComment('');
          loadDetails();
        } catch (err) {
          showToast('Comment failed: ' + err.message, 'error');
          showToast('Comment failed', 'error');
        }
      };

      const togglePin = async (c) => {
        try {
          await supabase.from('comments').update({ is_pinned: !c.is_pinned }).eq('id', c.id);
          loadDetails();
        } catch (err) {
          showToast('Pin failed', 'error');
        }
      };

      return (
        <div className="panel-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
          {conversionLead && (
            <ClientConversionModal
              lead={lead}
              showToast={showToast}
              onSuccess={() => {
                executeSave();
                setConversionLead(null);
                onClose();
              }}
              onCancel={() => {
                setConversionLead(null);
                setStatus(lead.status || 'new');
              }}
            />
          )}
          {lostModal && (
            <LostReasonModal
              lead={lead}
              showToast={showToast}
              onConfirm={(reason, notes) => {
                setRejection(reason);
                setLostNotes(notes);
                setLostModal(false);
                executeSave({ rejection_reason: reason, lost_notes: notes });
              }}
              onCancel={() => {
                setLostModal(false);
                setStatus(lead.status || 'new');
              }}
            />
          )}
          <div className="panel">
            <div className="panel-header">
              <h2>{[lead.first_name, lead.last_name].filter(Boolean).join(' ') || lead.username || 'Lead'}</h2>
              <button className="btn" onClick={onClose}>✕</button>
            </div>

            {lead.duplicate_of && (
              <div style={{ margin: '0 0 12px 0', padding: '10px 14px', background: '#fef3c7', borderLeft: '4px solid #f59e0b', borderRadius: 6 }}>
                <span style={{ fontWeight: 600, color: '#92400e' }}>⚠️ Duplicate Lead</span>
                <span style={{ color: '#78350f', fontSize: 13, marginLeft: 8 }}>
                  This lead is flagged as a duplicate of lead #{lead.duplicate_of}.
                </span>
              </div>
            )}
            <div className="panel-section">
              <h3>Contact Info</h3>
              <div className="field-row"><span className="label">Telegram</span><span>{lead.username ? <a href={`https://t.me/${lead.username}`} target="_blank">@{lead.username}</a> : '—'}</span></div>
              <div className="field-row"><span className="label">Phone</span><span>{lead.phone || '—'}</span></div>
              <div className="field-row"><span className="label">Source</span><span>{lead.source || '—'}</span></div>
              <div className="field-row"><span className="label">Language</span><span>{lead.preferred_lang || lead.language_code || '—'}</span></div>
              {(lead.status === 'lost' || status === 'lost') && (lead.rejection_reason || rejection) && (
                <div style={{ background: '#fef2f2', border: '1px solid #fecaca', borderRadius: 8, padding: '10px 12px', marginTop: 4, marginBottom: 4 }}>
                  <div style={{ fontSize: 11, color: '#dc2626', fontWeight: 700, textTransform: 'uppercase', letterSpacing: 0.5, marginBottom: 4 }}>Lost Reason</div>
                  <div style={{ fontSize: 13, fontWeight: 600, color: '#991b1b' }}>{rejection || lead.rejection_reason}</div>
                </div>
              )}
              <div className="field-row">
                <span className="label">Score</span>
                <span
                  style={{ color: scoreColor(lead.lead_score), fontWeight: 700, cursor: 'pointer', textDecoration: 'underline dotted' }}
                  title="Click for breakdown"
                  onClick={() => setShowScoreBreakdown(s => !s)}
                >{lead.lead_score ?? 0} ℹ️</span>
              </div>
              <div className="field-row" style={{ alignItems: 'flex-start' }}>
                <span className="label">Key Signals</span>
                <div style={{ display: 'flex', gap: 4, flexWrap: 'wrap' }}>
                  {lead.key_signals && lead.key_signals.length > 0
                    ? lead.key_signals.map((sig, i) => (
                        <span key={i} style={{ fontSize: 11, background: '#f5f5f5', padding: '2px 6px', borderRadius: 4 }}>{sig}</span>
                      ))
                    : <span style={{ color: '#94a3b8', fontSize: 13 }}>—</span>
                  }
                </div>
              </div>
              {showScoreBreakdown && (() => {
                const bd = computeScoreBreakdown(lead, events, convo);
                return (
                  <div style={{ background: '#f8fafc', border: '1px solid #e2e8f0', borderRadius: 8, padding: '10px 14px', fontSize: 13, marginBottom: 8 }}>
                    {bd.items.length === 0 && <div style={{ color: '#94a3b8' }}>Нет баллов пока</div>}
                    {bd.items.map((item, i) => (
                      <div key={i} style={{ display: 'flex', justifyContent: 'space-between', padding: '2px 0' }}>
                        <span>{item.label}</span><span style={{ fontWeight: 600, color: '#22c55e' }}>+{item.pts}</span>
                      </div>
                    ))}
                    <div style={{ borderTop: '1px solid #e2e8f0', marginTop: 6, paddingTop: 6, display: 'flex', justifyContent: 'space-between', fontWeight: 700 }}>
                      <span>Итого</span><span>{bd.total}</span>
                    </div>
                  </div>
                );
              })()}
              <div className="field-row"><span className="label">Created</span><span>{formatDate(lead.created_at)}</span></div>
            </div>

            <div className="panel-section">
              <h3>Qualification</h3>
              <div className="field-row">
                <span className="label">Business Type</span>
                <span>{lead.business_type ? `${BIZ_ICONS[lead.business_type] || ''} ${lead.business_type}` : '—'}</span>
              </div>
              {lead.business_type === 'Boshqa' && lead.business_type_other && (
                <div className="field-row">
                  <span className="label">Custom Type</span>
                  <span>{lead.business_type_other}</span>
                </div>
              )}
              <div className="field-row">
                <span className="label">Services</span>
                <div style={{ display: 'flex', flexWrap: 'wrap', gap: 4, justifyContent: 'flex-end', maxWidth: '60%' }}>
                  {(Array.isArray(lead.service_interest) ? lead.service_interest : []).map(s => (
                    <span key={s} className="tag">{s}</span>
                  ))}
                  {(!lead.service_interest || lead.service_interest.length === 0) && '—'}
                </div>
              </div>
              <div className="field-row">
                <span className="label">Current Marketing</span>
                <span style={{ textAlign: 'right' }}>{lead.current_marketing || '—'}</span>
              </div>
              <div className="field-row">
                <span className="label">Budget Range</span>
                <span style={{ color: BUDGET_COLORS[lead.budget_range] || 'inherit', fontWeight: 600 }}>{lead.budget_range || '—'}</span>
              </div>
              <div className="field-row">
                <span className="label">Q. Progress</span>
                <span>{lead.questionnaire_completed ? '✅ Completed' : `⏳ Step ${lead.questionnaire_step || 0}/5`}</span>
              </div>
            </div>

            <div className="panel-section">
              <h3>Status & Assignment</h3>
              <div className="form-group">
                <label>Status</label>
                <select value={status} onChange={e => setStatus(e.target.value)}>
                  {STATUSES.map(s => <option key={s} value={s}>{STATUS_LABELS[s]}</option>)}
                </select>
              </div>
              <div className="form-group">
                <label>Assigned To</label>
                {teamMembers.length > 0 ? (
                  <select value={assigned} onChange={e => setAssigned(e.target.value)}>
                    <option value="">— Unassigned —</option>
                    {teamMembers.map(m => (
                      <option key={m.name} value={m.name}>{m.name}</option>
                    ))}
                  </select>
                ) : (
                  <input value={assigned} onChange={e => setAssigned(e.target.value)} placeholder="Add team members in Settings first" />
                )}
              </div>
              <div className="form-group">
                <label>Next Follow-up</label>
                <input
                  type="datetime-local"
                  value={followup}
                  onChange={e => setFollowup(e.target.value)}
                  style={followup && new Date(followup) < new Date() ? { borderColor: '#ef4444', color: '#ef4444' } : {}}
                />
                {followup && new Date(followup) < new Date() && (
                  <div style={{ color: '#ef4444', fontSize: 12, marginTop: 4 }}>⚠️ Просрочено</div>
                )}
              </div>
              <div className="form-group">
                <label>Follow-up Note</label>
                <textarea
                  value={followupNote}
                  onChange={e => setFollowupNote(e.target.value)}
                  placeholder="What to discuss..."
                  rows="2"
                  style={{ width: '100%', padding: 8, border: '1px solid #e2e8f0', borderRadius: 6, fontFamily: 'inherit', fontSize: 14, resize: 'vertical' }}
                />
              </div>

              {/* Client info for converted leads */}
              {status === 'converted' && clientData ? (
                <div style={{ marginBottom: 12, background: '#f0fdf4', border: '1px solid #bbf7d0', borderRadius: 8, padding: 12 }}>
                  <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 8 }}>
                    <label style={{ fontSize: 12, color: '#166534', fontWeight: 700 }}>Client Details</label>
                    <button className="btn" style={{ fontSize: 11, padding: '2px 8px' }} onClick={() => setEditingClient(!editingClient)}>
                      {editingClient ? 'Cancel' : 'Edit'}
                    </button>
                  </div>
                  {!editingClient ? (
                    <div style={{ fontSize: 13 }}>
                      <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 4 }}>
                        <span style={{ color: '#64748b' }}>Type</span>
                        <span style={{ fontWeight: 600, textTransform: 'capitalize' }}>{clientData.client_type}</span>
                      </div>
                      <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 4 }}>
                        <span style={{ color: '#64748b' }}>{clientData.client_type === 'retainer' ? 'Monthly Value' : 'Value'}</span>
                        <span style={{ fontWeight: 700, color: '#059669', fontSize: 15 }}>
                          {clientData.retainer_amount > 0 ? `$${Number(clientData.retainer_amount).toLocaleString()} ${clientData.currency || 'USD'}` : '—'}
                        </span>
                      </div>
                      {clientData.client_type === 'retainer' && (
                        <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 4 }}>
                          <span style={{ color: '#64748b' }}>Status</span>
                          <span style={{
                            padding: '1px 8px', borderRadius: 10, fontSize: 11, fontWeight: 600,
                            background: clientData.retainer_status === 'active' ? '#dcfce7' : clientData.retainer_status === 'paused' ? '#fef9c3' : '#fee2e2',
                            color: clientData.retainer_status === 'active' ? '#166534' : clientData.retainer_status === 'paused' ? '#854d0e' : '#b91c1c'
                          }}>
                            {clientData.retainer_status || 'active'}
                          </span>
                        </div>
                      )}
                      {clientData.retainer_start_date && (
                        <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 4 }}>
                          <span style={{ color: '#64748b' }}>Since</span>
                          <span>{clientData.retainer_start_date}</span>
                        </div>
                      )}
                      <div style={{ display: 'flex', justifyContent: 'space-between' }}>
                        <span style={{ color: '#64748b' }}>Est. LTV</span>
                        <span style={{ fontWeight: 600, color: '#4F46E5' }}>
                          {clientData.estimated_ltv > 0 ? `$${Number(clientData.estimated_ltv).toLocaleString()}` : '—'}
                        </span>
                      </div>
                    </div>
                  ) : (
                    <div>
                      <div className="form-group" style={{ marginBottom: 8 }}>
                        <label style={{ fontSize: 11, color: '#64748b' }}>Type</label>
                        <select value={cType} onChange={e => setCType(e.target.value)} style={{ width: '100%', padding: '6px 10px', border: '1px solid #e2e8f0', borderRadius: 6, fontSize: 13 }}>
                          <option value="retainer">Retainer (Recurring)</option>
                          <option value="project">Project-based</option>
                          <option value="one-time">One-time</option>
                        </select>
                      </div>
                      <div className="form-group" style={{ marginBottom: 8 }}>
                        <label style={{ fontSize: 11, color: '#64748b' }}>{cType === 'retainer' ? 'Monthly Value' : 'Value'}</label>
                        <div style={{ display: 'flex', gap: 6 }}>
                          <input type="number" min="0" value={cAmount} onChange={e => setCAmount(e.target.value)} placeholder="e.g. 500"
                            style={{ flex: 3, minWidth: 0, padding: '6px 10px', border: '1px solid #e2e8f0', borderRadius: 6, fontSize: 13 }} />
                          <select value={cCurrency} onChange={e => setCCurrency(e.target.value)} style={{ flex: 1, minWidth: 70, maxWidth: 80, padding: '6px 8px', border: '1px solid #e2e8f0', borderRadius: 6, fontSize: 13 }}>
                            <option value="USD">USD</option>
                            <option value="UZS">UZS</option>

                        </div>
                      </div>
                      {cType === 'retainer' && (
                        <div className="form-group" style={{ marginBottom: 8 }}>
                          <label style={{ fontSize: 11, color: '#64748b' }}>Retainer Status</label>
                          <select value={cStatus} onChange={e => setCStatus(e.target.value)} style={{ width: '100%', padding: '6px 10px', border: '1px solid #e2e8f0', borderRadius: 6, fontSize: 13 }}>
                            <option value="active">Active</option>
                            <option value="paused">Paused</option>

                          style={{ width: '100%', padding: '6px 10px', border: '1px solid #e2e8f0', borderRadius: 6, fontSize: 13, boxSizing: 'border-box' }} />
                      </div>
                      <button className="btn btn-primary" style={{ width: '100%', padding: '6px 0', fontSize: 13, marginTop: 4 }}
                        disabled={savingClient}
                        onClick={async () => {
                          setSavingClient(true);
                          try {
                            const updateData = {
                              client_type: cType,
                              retainer_amount: cAmount ? parseFloat(cAmount) : 0,
                              currency: cCurrency,
                              retainer_status: cType === 'retainer' ? cStatus : null,
                            };
                            if (cLtv) updateData.estimated_ltv = parseFloat(cLtv);
                            else updateData.estimated_ltv = null;
                            const { error } = await supabase.from('clients').update(updateData).eq('telegram_id', lead.telegram_id);
                            if (error) throw error;
                            setClientData(prev => ({ ...prev, client_type: cType, retainer_amount: cAmount ? parseFloat(cAmount) : 0, currency: cCurrency, retainer_status: cType === 'retainer' ? cStatus : null, estimated_ltv: cLtv ? parseFloat(cLtv) : null }));
                            setEditingClient(false);
                            showToast('Client updated', 'success');
                          } catch (err) { showToast('Error: ' + err.message, 'error'); }
                          finally { setSavingClient(false); }
                        }}>
                        {savingClient ? 'Saving...' : 'Save Client'}
                      </button>
                    </div>
                  )}
                </div>
              ) : status === 'converted' && !clientData ? (
                <div style={{ marginBottom: 12, background: '#fffbeb', border: '1px solid #fde68a', borderRadius: 8, padding: 12, fontSize: 13, color: '#92400e' }}>
                  No client record found. This lead was converted but client details were not saved.
                </div>
              ) : (
                <div style={{ marginBottom: 12 }}>
                  <label style={{ fontSize: 12, color: '#64748b', fontWeight: 600, display: 'block', marginBottom: 4 }}>
                    Estimated Deal Value
                  </label>
                  <div style={{ display: 'flex', gap: 8 }}>
                    <input
                      type="number"
                      min="0"
                      placeholder="e.g. 5000"
                      value={dealValue}
                      onChange={e => setDealValue(e.target.value)}
                      style={{ flex: 1, padding: '6px 10px', border: '1px solid #e2e8f0', borderRadius: 6, fontSize: 13 }}
                    />
                    <select
                      value={dealCurrency}
                      onChange={e => setDealCurrency(e.target.value)}
                      style={{ padding: '6px 10px', border: '1px solid #e2e8f0', borderRadius: 6, fontSize: 13 }}
                    >
                      <option value="USD">USD</option>
                      <option value="UZS">UZS</option>
                    </select>
                  </div>
                </div>
              )}

              {/* ── Proposals ── */}
              <div style={{ marginBottom: 16 }}>
                <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 8 }}>
                  <label style={{ fontSize: 12, color: '#64748b', fontWeight: 600 }}>Proposals ({proposals.length})</label>
                  <button
                    className="btn btn-primary"
                    style={{ fontSize: 12, padding: '4px 10px' }}
                    onClick={() => setShowProposalForm(f => !f)}
                  >
                    {showProposalForm ? 'Cancel' : '+ Create'}
                  </button>
                </div>

                {showProposalForm && (
                  <div style={{ background: '#f8fafc', border: '1px solid #e2e8f0', borderRadius: 8, padding: 12, marginBottom: 10 }}>
                    <input
                      placeholder="Title (e.g. SMM Package)"
                      value={propTitle}
                      onChange={e => setPropTitle(e.target.value)}
                      style={{ width: '100%', padding: '6px 10px', border: '1px solid #e2e8f0', borderRadius: 6, marginBottom: 8, fontSize: 13 }}
                    />
                    <div style={{ display: 'flex', gap: 8, marginBottom: 8 }}>
                      <input
                        type="number" min="0" placeholder="Amount"
                        value={propAmount}
                        onChange={e => setPropAmount(e.target.value)}
                        style={{ flex: 1, padding: '6px 10px', border: '1px solid #e2e8f0', borderRadius: 6, fontSize: 13 }}
                      />
                      <select value={propCurrency} onChange={e => setPropCurrency(e.target.value)}
                        style={{ padding: '6px 10px', border: '1px solid #e2e8f0', borderRadius: 6, fontSize: 13 }}>
                        <option value="USD">USD</option>
                        <option value="UZS">UZS</option>
                      </select>
                    </div>
                    <div style={{ marginBottom: 8 }}>
                      <label style={{ fontSize: 12, color: '#64748b', display: 'block', marginBottom: 4 }}>Valid until</label>
                      <input type="date" value={propValidUntil} onChange={e => setPropValidUntil(e.target.value)}
                        style={{ padding: '6px 10px', border: '1px solid #e2e8f0', borderRadius: 6, fontSize: 13, width: '100%' }} />
                    </div>
                    <button className="btn btn-primary" style={{ width: '100%' }} onClick={createProposal} disabled={savingProposal}>
                      {savingProposal ? 'Saving…' : 'Save Proposal'}
                    </button>
                  </div>
                )}

                {proposals.length === 0 ? (
                  <div style={{ fontSize: 13, color: '#94a3b8' }}>No proposals yet.</div>
                ) : (
                  proposals.map(p => {
                    const statusColors = { sent: '#6366f1', accepted: '#22c55e', rejected: '#ef4444', expired: '#94a3b8' };
                    const amtFmt = Number(p.amount).toLocaleString();
                    return (
                      <div key={p.id} style={{ border: '1px solid #e2e8f0', borderRadius: 8, padding: '10px 12px', marginBottom: 8 }}>
                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 4 }}>
                          <span style={{ fontWeight: 600, fontSize: 13 }}>{p.title}</span>
                          <span style={{ background: statusColors[p.status] || '#94a3b8', color: '#fff', borderRadius: 10, padding: '2px 8px', fontSize: 11, fontWeight: 600 }}>
                            {p.status}
                          </span>
                        </div>
                        <div style={{ fontSize: 13, color: '#64748b' }}>{amtFmt} {p.currency} · until {p.valid_until}</div>
                        <div style={{ fontSize: 12, color: '#94a3b8', marginTop: 2 }}>by {p.created_by || '—'}</div>
                        {p.status === 'sent' && (
                          <div style={{ display: 'flex', gap: 6, marginTop: 8 }}>
                            <button className="btn" style={{ fontSize: 12, padding: '3px 10px', color: '#22c55e', borderColor: '#22c55e' }}
                              onClick={() => updateProposalStatus(p.id, 'accepted')}>Accept</button>
                            <button className="btn" style={{ fontSize: 12, padding: '3px 10px', color: '#ef4444', borderColor: '#ef4444' }}
                              onClick={() => updateProposalStatus(p.id, 'rejected')}>Reject</button>
                          </div>
                        )}
                      </div>
                    );
                  })
                )}
              </div>

              <button className="btn btn-primary" onClick={save} disabled={saving}>{saving ? 'Saving...' : 'Save'}</button>
            </div>

            <div className="panel-section">
              <h3>Chat with Lead</h3>
              <div className="chat-container">
                {convo.length === 0 && <div className="empty">No messages yet. Type below to start.</div>}
                {convo.map(m => (
                  <div key={m.id} className={`chat-bubble ${m.role === 'user' ? 'chat-user' : 'chat-assistant'} ${!m.is_sent ? 'pending' : ''}`} title={m.role === 'assistant' && !m.is_sent ? 'Pending delivery...' : ''}>
                    {m.message}
                    {m.role === 'assistant' && !m.is_sent && <span style={{ fontSize: 10, opacity: 0.7, marginLeft: 4 }}>⏳</span>}
                  </div>
                ))}
              </div>
              <div className="chat-input-area">
                <input 
                  value={msgInput} 
                  onChange={e => setMsgInput(e.target.value)} 
                  onKeyDown={e => e.key === 'Enter' && sendMessage()}
                  placeholder="Type a message..." 
                  disabled={sendingMsg}
                  style={{ flex: 1, padding: 8, border: '1px solid #e2e8f0', borderRadius: 6, fontSize: 13 }} 
                />
                <button className="btn btn-primary" onClick={sendMessage} disabled={sendingMsg || !msgInput.trim()}>
                  {sendingMsg ? '...' : 'Send'}
                </button>
              </div>
            </div>

            <div className="panel-section">
              <h3>Activity Timeline</h3>
              {events.length === 0 && <div className="empty">No events</div>}
              {events.map(e => (
                <div key={e.id} className="activity-item">
                  <span className="icon">
                    <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                  </span>
                  <span style={{ fontSize: 12, color: 'var(--text-2)' }}>{e.event_type.replace(/_/g, ' ')}</span>
                  <span className="time">{timeAgo(e.created_at)}</span>
                </div>
              ))}
            </div>

            <div className="panel-section">
              <h3>Comments</h3>
              {comments.length === 0 && <div className="empty">No comments</div>}
              {comments.map(c => (
                <div key={c.id} className={`comment ${c.is_pinned ? 'pinned' : ''}`}>
                  <div className="meta">
                    <span>{c.is_pinned ? '📌 ' : ''}{c.author} · {timeAgo(c.created_at)}</span>
                    <button className="btn" style={{ padding: '2px 8px', fontSize: 11 }} onClick={() => togglePin(c)}>
                      {c.is_pinned ? 'Unpin' : 'Pin'}
                    </button>
                  </div>
                  <div style={{ marginTop: 4 }}>{c.content}</div>
                </div>
              ))}
              <div style={{ marginTop: 10 }}>
                <textarea value={newComment} onChange={e => setNewComment(e.target.value)} placeholder="Add a comment..." rows="2" style={{ width: '100%', padding: 8, border: '1px solid #e2e8f0', borderRadius: 6, fontFamily: 'inherit', fontSize: 14 }} />
                <button className="btn btn-primary" style={{ marginTop: 6 }} onClick={addComment}>Add Comment</button>
              </div>
            </div>

            <div className="panel-section">
              <h3>Source Journey (Attribution)</h3>
              <div style={{ fontSize: 13, padding: '6px 0' }}>
                <span style={{ color: '#64748b', marginRight: 6 }}>Original First-Touch:</span>
                <strong>{lead.original_source || lead.source || 'organic'}</strong>
              </div>
              {lead.touchpoints && lead.touchpoints.length > 0 && (
                <div style={{ marginTop: 8 }}>
                  <span style={{ color: '#64748b', fontSize: 12, marginBottom: 4, display: 'block', fontWeight: 500 }}>Subsequent Interactions:</span>
                  {lead.touchpoints.map((tp, i) => (
                    <div key={i} style={{ fontSize: 13, padding: '4px 0', marginLeft: 6, borderLeft: '2px solid #e2e8f0', paddingLeft: 10, marginTop: 4 }}>
                       <strong style={{ color: '#0f172a' }}>{tp.source}</strong> <span style={{ color: '#94a3b8', fontSize: 12 }}>· {timeAgo(tp.timestamp)}</span>
                    </div>
                  ))}
                </div>
              )}
            </div>

            <div className="panel-section">
              <h3>Status History</h3>
              {history.length === 0 && <div className="empty">No history</div>}
              {history.map(h => (
                <div key={h.id} style={{ fontSize: 13, padding: '6px 0', borderBottom: '1px solid #f1f5f9' }}>
                  <span style={{ color: '#64748b' }}>{h.old_status || '—'}</span> → <strong>{h.new_status}</strong>
                  <span style={{ color: '#94a3b8', marginLeft: 8, fontSize: 12 }}>by {h.changed_by || '—'} · {timeAgo(h.created_at)}</span>
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    }

    // Kanban
    function Kanban({ showToast, refreshKey, onOpenLead }) {
      const [leads, setLeads] = useState([]);
      const [loading, setLoading] = useState(true);
      const [dragOverCol, setDragOverCol] = useState(null);

      const load = useCallback(async () => {
        setLoading(true);
        try {
          const { data, error } = await supabase.from('leads').select('*, lead_tags(tag, confidence, source)').order('updated_at', { ascending: false });
          if (error) throw error;
          setLeads(data || []);
        } catch (e) {
          showToast('Failed to load: ' + e.message, 'error');
        } finally {
          setLoading(false);
        }
      }, [showToast]);

      useEffect(() => { load(); }, [load, refreshKey]);

      const [conversionLead, setConversionLead] = useState(null);
      const [lostLead, setLostLead] = useState(null);

      const handleDragStart = (e, lead) => {
        e.dataTransfer.setData('leadId', lead.id);
        e.dataTransfer.setData('oldStatus', lead.status || 'new');
      };

      const handleDrop = async (e, newStatus) => {
        e.preventDefault();
        setDragOverCol(null);
        const leadId = e.dataTransfer.getData('leadId');
        const oldStatus = e.dataTransfer.getData('oldStatus');
        if (!leadId || oldStatus === newStatus) return;
        const lead = leads.find(l => String(l.id) === String(leadId));
        if (!lead) return;
        
        if (newStatus === 'converted') {
          // Optimistically move the card immediately for instant feedback
          setLeads(ls => ls.map(l => l.id === lead.id ? { ...l, status: newStatus } : l));
          // Check if client record already exists; if so, skip conversion modal
          const { data: existingClient } = await supabase.from('clients').select('id').eq('telegram_id', lead.telegram_id).maybeSingle();
          if (existingClient) {
            executeStatusChange(lead, oldStatus, newStatus);
          } else {
            // Revert optimistic update — modal will handle the actual change
            setLeads(ls => ls.map(l => l.id === lead.id ? { ...l, status: oldStatus } : l));
            setConversionLead({ lead, oldStatus, newStatus });
          }
          return;
        }

        if (newStatus === 'lost') {
          setLostLead({ lead, oldStatus, newStatus });
          return;
        }

        executeStatusChange(lead, oldStatus, newStatus);
      };

      const executeStatusChange = async (lead, oldStatus, newStatus, extra = {}) => {
        setLeads(ls => ls.map(l => l.id === lead.id ? { ...l, status: newStatus } : l));
        try {
          const updatePayload = { status: newStatus, updated_at: new Date().toISOString() };
          if (extra.rejection_reason) updatePayload.rejection_reason = extra.rejection_reason;
          const { error } = await supabase.from('leads').update(updatePayload).eq('id', lead.id);
          if (error) throw error;
          const changer = getCrmUserName() || 'CRM';
          await supabase.from('status_history').insert({
            telegram_id: lead.telegram_id, old_status: oldStatus, new_status: newStatus, changed_by: changer,
          });
          const leadName = `${lead.first_name || ''} ${lead.last_name || ''}`.trim() || lead.username || 'Unknown';
          const reasonText = extra.rejection_reason ? `\nПричина: ${extra.rejection_reason}` : '';
          await notifyAdmins(`🔄 Статус изменён (Kanban)\n\nЛид: <b>${leadName}</b>\nСтарый: ${STATUS_LABELS[oldStatus] || oldStatus}\nНовый: <b>${STATUS_LABELS[newStatus] || newStatus}</b>${reasonText}\nИзменил: ${changer}`);
          showToast('Status updated', 'success');
        } catch (err) {
          showToast('Update failed: ' + err.message, 'error');
          load();
        }
      };

      if (loading) return <div className="center-load"><div className="spinner" /></div>;

      return (
        <div className="kanban">
          {conversionLead && (
            <ClientConversionModal
              lead={conversionLead.lead}
              showToast={showToast}
              onSuccess={() => {
                executeStatusChange(conversionLead.lead, conversionLead.oldStatus, conversionLead.newStatus);
                setConversionLead(null);
              }}
              onCancel={() => {
                setConversionLead(null);
              }}
            />
          )}
          {lostLead && (
            <LostReasonModal
              lead={lostLead.lead}
              showToast={showToast}
              onConfirm={(reason, notes) => {
                const fullReason = [reason, notes].filter(Boolean).join(' — ');
                executeStatusChange(lostLead.lead, lostLead.oldStatus, lostLead.newStatus, { rejection_reason: fullReason });
                setLostLead(null);
              }}
              onCancel={() => {
                setLostLead(null);
              }}
            />
          )}
          {STATUSES.map(s => {
            const colLeads = leads.filter(l => (l.status || 'new') === s);
            const colRevenue = colLeads.reduce((sum, l) => sum + (l.deal_value || 0), 0);
            const colCurrency = colLeads.find(l => l.deal_value)?.deal_currency || 'USD';
            return (
              <div
                key={s}
                className={`kanban-col ${dragOverCol === s ? 'dragover' : ''}`}
                onDragOver={e => { e.preventDefault(); setDragOverCol(s); }}
                onDragLeave={() => setDragOverCol(null)}
                onDrop={e => handleDrop(e, s)}
              >
                <div className="kanban-col-header">
                  <div style={{ display: 'flex', alignItems: 'center', gap: 8, flex: 1, minWidth: 0 }}>
                    <span className="title" style={{ color: STATUS_COLORS[s] }}>{STATUS_LABELS[s]}</span>
                    {colRevenue > 0 && (
                      <span style={{ background: '#ecfdf5', color: '#059669', padding: '2px 8px', borderRadius: 10, fontSize: 12, fontWeight: 700, whiteSpace: 'nowrap' }}>
                        {fmtRevenue(colRevenue, colCurrency)}
                      </span>
                    )}
                  </div>
                  <span style={{ background: STATUS_COLORS[s], color: '#fff', padding: '2px 8px', borderRadius: 10, fontSize: 11, fontWeight: 600 }}>{colLeads.length}</span>
                </div>
                <div className="kanban-col-cards">
                  {colLeads.map(l => (
                    <div
                      key={l.id}
                      className="kanban-card"
                      draggable
                      onDragStart={e => handleDragStart(e, l)}
                      onClick={() => onOpenLead(l)}
                      style={isStale(l) ? { borderLeft: '3px solid #ef4444' } : {}}
                    >
                      <div className="name">{[l.first_name, l.last_name].filter(Boolean).join(' ') || l.username || '—'}</div>
                      {l.phone && <div style={{ fontSize: 12, color: '#64748b' }}>{l.phone}</div>}
                      <div style={{ fontSize: 12, color: '#64748b', marginTop: 2 }}>{l.source || '—'}</div>
                      <div className="meta" style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
                        <span style={{ color: scoreColor(l.lead_score), fontWeight: 700 }}>{l.lead_score ?? 0}pt</span>
                        {l.sentiment && <span title={`Sentiment: ${l.sentiment}`} style={{ fontSize: 12 }}>{l.sentiment === 'positive' ? '🟢' : l.sentiment === 'negative' ? '🔴' : '🟡'}</span>}
                        <span style={{ marginLeft: 'auto' }}>{timeAgo(l.updated_at)}</span>
                      </div>
                      {l.lead_tags && l.lead_tags.length > 0 && (

                          ))}
                        </div>
                      )}
                    </div>
                  ))}
                </div>
              </div>
            );
          })}
        </div>
      );
    }

    function RejectionReasonsManager({ showToast }) {
      const [reasons, setReasons] = useState([]);
      const [newLabel, setNewLabel] = useState('');

      const load = () => {
        supabase.from('rejection_reasons').select('id, label, sort_order').order('sort_order').then(({ data }) => {
          setReasons(data || []);
        });
      };
      React.useEffect(load, []);

      const add = async () => {
        const label = newLabel.trim();
        if (!label) { showToast('Label required', 'error'); return; }
        const maxOrder = reasons.length ? Math.max(...reasons.map(r => r.sort_order)) : 0;
        const { error } = await supabase.from('rejection_reasons').insert({ label, sort_order: maxOrder + 1 });
        if (error) { showToast(error.message, 'error'); return; }
        setNewLabel('');
        showToast('Reason added', 'success');
        load();
      };

      const remove = async (id) => {
        await supabase.from('rejection_reasons').delete().eq('id', id);
        showToast('Removed', 'success');
        load();
      };

      return (
        <div>
          {reasons.length === 0 ? (
            <div style={{ color: '#64748b', fontSize: 13, marginBottom: 12 }}>No reasons yet.</div>
          ) : (
            <div style={{ border: '1px solid #e2e8f0', borderRadius: 6, marginBottom: 12 }}>
              {reasons.map(r => (
                <div key={r.id} style={{ display: 'flex', alignItems: 'center', padding: '8px 12px', borderBottom: '1px solid #e2e8f0' }}>
                  <span style={{ flex: 1 }}>{r.label}</span>
                  <button onClick={() => remove(r.id)} style={{ background: 'none', border: 'none', color: '#ef4444', cursor: 'pointer', fontSize: 16 }}>×</button>
                </div>
              ))}
            </div>
          )}
          <div style={{ display: 'flex', gap: 8 }}>
            <input
              value={newLabel}
              onChange={e => setNewLabel(e.target.value)}
              onKeyDown={e => e.key === 'Enter' && add()}
              placeholder="e.g. Price too high"
              style={{ flex: 1, padding: 8, border: '1px solid #e2e8f0', borderRadius: 6 }}
            />
            <button className="btn btn-primary" onClick={add}>Add</button>
          </div>
        </div>
      );
    }

    // ── CAMPAIGNS ────────────────────────────────────────────────────────────
    function CampaignsTab({ showToast }) {
      const [campaigns, setCampaigns] = useState([]);
      const [loading, setLoading] = useState(true);
      const [view, setView] = useState('list'); // 'list' | 'builder' | 'delivery'
      const [selectedCampaign, setSelectedCampaign] = useState(null);

      // Builder state
      const [bName, setBName] = useState('');
      const [bMsgUz, setBMsgUz] = useState('');
      const [bMsgRu, setBMsgRu] = useState('');
      const [bStatus, setBStatus] = useState('');
      const [bSource, setBSource] = useState('');
      const [bLang, setBLang] = useState('');
      const [bTag, setBTag] = useState('');
      const [bInactiveDays, setBInactiveDays] = useState('');
      const [bScheduled, setBScheduled] = useState('');
      const [recipientCount, setRecipientCount] = useState(null);
      const [countLoading, setCountLoading] = useState(false);
      const [saving, setSaving] = useState(false);

      // Delivery state
      const [deliveries, setDeliveries] = useState([]);
      const [delivLoading, setDelivLoading] = useState(false);

      const loadCampaigns = useCallback(async () => {
        setLoading(true);
        try {
          const { data } = await supabase.from('campaigns').select('*').order('created_at', { ascending: false });
          setCampaigns(data || []);
        } catch(e) { showToast('Failed to load campaigns', 'error'); }
        finally { setLoading(false); }
      }, [showToast]);

      useEffect(() => { loadCampaigns(); }, [loadCampaigns]);

      const buildFilters = () => {
        const f = {};
        if (bStatus) f.status = bStatus;
        if (bSource) f.source = bSource;
        if (bLang) f.language = bLang;
        if (bInactiveDays) f.inactive_days = parseInt(bInactiveDays);
        if (bTag) f.tag = bTag;
        return f;
      };

      const previewCount = async () => {
        setCountLoading(true);
        setRecipientCount(null);
        try {
          const filters = buildFilters();
          let query = supabase.from('leads').select('telegram_id, updated_at, preferred_lang, duplicate_of');
          if (filters.status) query = query.eq('status', filters.status);
          if (filters.source) query = query.eq('source', filters.source);
          if (filters.language) query = query.eq('preferred_lang', filters.language);
          const { data } = await query;
          let leads = (data || []).filter(l => !l.duplicate_of);
          if (filters.inactive_days) {
            const cutoff = new Date(Date.now() - filters.inactive_days * 86400000);
            leads = leads.filter(l => l.updated_at && new Date(l.updated_at) < cutoff);
          }
          if (filters.tag) {
            const { data: tagged } = await supabase.from('lead_tags').select('telegram_id').eq('tag', filters.tag);
            const taggedIds = new Set((tagged || []).map(t => t.telegram_id));
            leads = leads.filter(l => taggedIds.has(l.telegram_id));
          }
          setRecipientCount(leads.length);
        } catch(e) { showToast('Preview failed: ' + e.message, 'error'); }
        finally { setCountLoading(false); }
      };

      const saveCampaign = async (sendNow) => {
        if (!bName.trim()) { showToast('Name required', 'error'); return; }
        if (!bMsgUz.trim() && !bMsgRu.trim()) { showToast('At least one message template required', 'error'); return; }
        setSaving(true);
        try {
          const payload = {
            name: bName.trim(),
            message_uz: bMsgUz.trim(),
            message_ru: bMsgRu.trim(),
            target_filters: buildFilters(),
            status: sendNow ? 'scheduled' : 'draft',
            scheduled_for: sendNow ? 
              (bScheduled ? bScheduled + ':00+05:00' : new Date().toLocaleString('sv', { timeZone: 'Asia/Tashkent' }).replace(' ', 'T') + '+05:00') :

            created_by: localStorage.getItem('crm_user_name') || 'CRM',
          };
          const { error } = await supabase.from('campaigns').insert(payload);
          if (error) throw error;
          showToast(sendNow ? 'Campaign scheduled!' : 'Draft saved!', 'success');
          setBName(''); setBMsgUz(''); setBMsgRu(''); setBStatus(''); setBSource('');
          setBLang(''); setBTag(''); setBScheduled(''); setRecipientCount(null);
          setView('list');
          loadCampaigns();
        } catch(e) { showToast('Save failed: ' + e.message, 'error'); }
        finally { setSaving(false); }
      };

      const deleteCampaign = async (id) => {
        if (!confirm('Delete this campaign? This cannot be undone.')) return;
        await supabase.from('campaigns').delete().eq('id', id);
        showToast('Campaign deleted', 'success');
        loadCampaigns();
      };

      const cancelCampaign = async (id) => {

            </div>
          </div>

          <div className="card" style={{ marginBottom: 16 }}>
            <h3 style={{ marginBottom: 12 }}>Target Audience</h3>

              <div>

              </div>
            </div>
            <div style={{ marginTop: 16, display: 'flex', alignItems: 'center', gap: 12 }}>

                <span style={{ fontWeight: 700, fontSize: 15, color: recipientCount > 0 ? '#166534' : '#b91c1c' }}>
                  {recipientCount === 0 ? '⚠️ No matching leads' : `✅ ${recipientCount} recipients`}

              {bScheduled ? '📅 Schedule Campaign' : '🚀 Send Now'}
