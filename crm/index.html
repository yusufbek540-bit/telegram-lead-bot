            </div>
          </div>
        </div>
      );
    }

    // Kanban
    function Kanban({ showToast, refreshKey, onOpenLead }) {
      const [leads, setLeads] = useState([]);
      const [loading, setLoading] = useState(true);
      const [dragOverCol, setDragOverCol] = useState(null);

      const load = useCallback(async () => {
        setLoading(true);
        try {
          const { data, error } = await supabase.from('leads').select('*, lead_tags(tag, confidence, source)').order('updated_at', { ascending: false });
          if (error) throw error;
          setLeads(data || []);
        } catch (e) {
          showToast('Failed to load: ' + e.message, 'error');
        } finally {
          setLoading(false);
        }
      }, [showToast]);

      useEffect(() => { load(); }, [load, refreshKey]);

      const handleDragStart = (e, lead) => {
        e.dataTransfer.setData('leadId', lead.id);
        e.dataTransfer.setData('oldStatus', lead.status || 'new');
      };

      const handleDrop = async (e, newStatus) => {
        e.preventDefault();
        setDragOverCol(null);
        const leadId = e.dataTransfer.getData('leadId');
        const oldStatus = e.dataTransfer.getData('oldStatus');
        if (!leadId || oldStatus === newStatus) return;
        const lead = leads.find(l => String(l.id) === String(leadId));
        if (!lead) return;
        setLeads(ls => ls.map(l => l.id === lead.id ? { ...l, status: newStatus } : l));
        try {
          const { error } = await supabase.from('leads').update({ status: newStatus, updated_at: new Date().toISOString() }).eq('id', lead.id);
          if (error) throw error;
          const changer = getCrmUserName() || 'CRM';
          await supabase.from('status_history').insert({
            telegram_id: lead.telegram_id, old_status: oldStatus, new_status: newStatus, changed_by: changer,
          });
          const leadName = `${lead.first_name || ''} ${lead.last_name || ''}`.trim() || lead.username || 'Unknown';
          await notifyAdmins(`🔄 Статус изменён (Kanban)\n\nЛид: <b>${leadName}</b>\nСтарый: ${STATUS_LABELS[oldStatus] || oldStatus}\nНовый: <b>${STATUS_LABELS[newStatus] || newStatus}</b>\nИзменил: ${changer}`);
          showToast('Status updated', 'success');
        } catch (err) {
          showToast('Update failed: ' + err.message, 'error');
          load();
        }
      };

      if (loading) return <div className="center-load"><div className="spinner" /></div>;

      return (
        <div className="kanban">
          {STATUSES.map(s => {
            const colLeads = leads.filter(l => (l.status || 'new') === s);
            const colRevenue = colLeads.reduce((sum, l) => sum + (l.deal_value || 0), 0);
            const colCurrency = colLeads.find(l => l.deal_value)?.deal_currency || 'UZS';
            return (
              <div
                key={s}
                className={`kanban-col ${dragOverCol === s ? 'dragover' : ''}`}
                onDragOver={e => { e.preventDefault(); setDragOverCol(s); }}
                onDragLeave={() => setDragOverCol(null)}
                onDrop={e => handleDrop(e, s)}
              >
                <div className="kanban-col-header">
                  <span className="title" style={{ color: STATUS_COLORS[s] }}>{STATUS_LABELS[s]}</span>
                  <span style={{ background: STATUS_COLORS[s], color: '#fff', padding: '2px 8px', borderRadius: 10, fontSize: 11, fontWeight: 600 }}>{colLeads.length}</span>
                </div>
                {colRevenue > 0 && (
                  <div style={{ fontSize: 11, color: '#64748b', marginTop: 2, paddingLeft: 2 }}>
                    💰 {fmtRevenue(colRevenue, colCurrency)}
                  </div>
                )}
                <div className="kanban-col-cards">
                  {colLeads.map(l => (
                    <div
                      key={l.id}
                      className="kanban-card"
                      draggable
                      onDragStart={e => handleDragStart(e, l)}
                      onClick={() => onOpenLead(l)}
                      style={isStale(l) ? { borderLeft: '3px solid #ef4444' } : {}}
                    >
                      <div className="name">{[l.first_name, l.last_name].filter(Boolean).join(' ') || l.username || '—'}</div>
                      {l.phone && <div style={{ fontSize: 12, color: '#64748b' }}>{l.phone}</div>}
                      <div style={{ fontSize: 12, color: '#64748b', marginTop: 2 }}>{l.source || '—'}</div>
                      <div className="meta" style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
                        <span style={{ color: scoreColor(l.lead_score), fontWeight: 700 }}>⚡ {l.lead_score ?? 0}</span>
                        {l.sentiment && <span title={`Sentiment: ${l.sentiment}`} style={{ fontSize: 12 }}>{l.sentiment === 'positive' ? '🟢' : l.sentiment === 'negative' ? '🔴' : '🟡'}</span>}
                        <span style={{ marginLeft: 'auto' }}>{timeAgo(l.updated_at)}</span>
                      </div>
                      {l.lead_tags && l.lead_tags.length > 0 && (
                        <div style={{ display: 'flex', gap: 4, flexWrap: 'wrap', marginTop: 8 }}>
                          {l.lead_tags.slice(0, 3).map((t, i) => (
                            <span key={i} style={{ background: '#e0f7fa', color: '#006064', padding: '2px 4px', borderRadius: 4, fontSize: 10, fontWeight: 500 }}>
                              #{t.tag}
                            </span>
                          ))}
                        </div>
                      )}
                    </div>
                  ))}
                </div>
              </div>
            );
          })}
        </div>
      );
    }

    function RejectionReasonsManager({ showToast }) {
      const [reasons, setReasons] = useState([]);
      const [newLabel, setNewLabel] = useState('');

      const load = () => {
        supabase.from('rejection_reasons').select('id, label, sort_order').order('sort_order').then(({ data }) => {
          setReasons(data || []);
        });
      };
      React.useEffect(load, []);

      const add = async () => {
        const label = newLabel.trim();
        if (!label) { showToast('Label required', 'error'); return; }
        const maxOrder = reasons.length ? Math.max(...reasons.map(r => r.sort_order)) : 0;
        const { error } = await supabase.from('rejection_reasons').insert({ label, sort_order: maxOrder + 1 });
        if (error) { showToast(error.message, 'error'); return; }
        setNewLabel('');
        showToast('Reason added', 'success');
        load();
      };

      const remove = async (id) => {
        await supabase.from('rejection_reasons').delete().eq('id', id);
        showToast('Removed', 'success');
        load();
      };

      return (
        <div>
          {reasons.length === 0 ? (
            <div style={{ color: '#64748b', fontSize: 13, marginBottom: 12 }}>No reasons yet.</div>
          ) : (
            <div style={{ border: '1px solid #e2e8f0', borderRadius: 6, marginBottom: 12 }}>
              {reasons.map(r => (
                <div key={r.id} style={{ display: 'flex', alignItems: 'center', padding: '8px 12px', borderBottom: '1px solid #e2e8f0' }}>
                  <span style={{ flex: 1 }}>{r.label}</span>
                  <button onClick={() => remove(r.id)} style={{ background: 'none', border: 'none', color: '#ef4444', cursor: 'pointer', fontSize: 16 }}>×</button>
                </div>
              ))}
            </div>
          )}
          <div style={{ display: 'flex', gap: 8 }}>
            <input
              value={newLabel}
              onChange={e => setNewLabel(e.target.value)}
              onKeyDown={e => e.key === 'Enter' && add()}
              placeholder="e.g. Price too high"
              style={{ flex: 1, padding: 8, border: '1px solid #e2e8f0', borderRadius: 6 }}
            />
            <button className="btn btn-primary" onClick={add}>Add</button>
          </div>
        </div>
      );
    }

    // ── CAMPAIGNS ────────────────────────────────────────────────────────────
    function CampaignsTab({ showToast }) {
      const [campaigns, setCampaigns] = useState([]);
      const [loading, setLoading] = useState(true);
      const [view, setView] = useState('list'); // 'list' | 'builder' | 'delivery'
      const [selectedCampaign, setSelectedCampaign] = useState(null);

      // Builder state
      const [bName, setBName] = useState('');
      const [bMsgUz, setBMsgUz] = useState('');
      const [bMsgRu, setBMsgRu] = useState('');
      const [bStatus, setBStatus] = useState('');
      const [bSource, setBSource] = useState('');
      const [bLang, setBLang] = useState('');
      const [bInactiveDays, setBInactiveDays] = useState('');
      const [bTag, setBTag] = useState('');
      const [bScheduled, setBScheduled] = useState('');
      const [recipientCount, setRecipientCount] = useState(null);
      const [countLoading, setCountLoading] = useState(false);
      const [saving, setSaving] = useState(false);

      // Delivery state
      const [deliveries, setDeliveries] = useState([]);
      const [delivLoading, setDelivLoading] = useState(false);

      const loadCampaigns = useCallback(async () => {
        setLoading(true);
        try {
          const { data } = await supabase.from('campaigns').select('*').order('created_at', { ascending: false });
          setCampaigns(data || []);
        } catch(e) { showToast('Failed to load campaigns', 'error'); }
        finally { setLoading(false); }
      }, [showToast]);

      useEffect(() => { loadCampaigns(); }, [loadCampaigns]);

      const buildFilters = () => {
        const f = {};
        if (bStatus) f.status = bStatus;
        if (bSource) f.source = bSource;
        if (bLang) f.language = bLang;
        if (bInactiveDays) f.inactive_days = parseInt(bInactiveDays);
        if (bTag) f.tag = bTag;
        return f;
      };

      const previewCount = async () => {
        setCountLoading(true);
        setRecipientCount(null);
        try {
          const filters = buildFilters();
          let query = supabase.from('leads').select('telegram_id, updated_at, preferred_lang, duplicate_of');
          if (filters.status) query = query.eq('status', filters.status);
          if (filters.source) query = query.eq('source', filters.source);
          if (filters.language) query = query.eq('preferred_lang', filters.language);
          const { data } = await query;
          let leads = (data || []).filter(l => !l.duplicate_of);
          if (filters.inactive_days) {
            const cutoff = new Date(Date.now() - filters.inactive_days * 86400000);
            leads = leads.filter(l => l.updated_at && new Date(l.updated_at) < cutoff);
          }
          if (filters.tag) {
            const { data: tagged } = await supabase.from('lead_tags').select('telegram_id').eq('tag', filters.tag);
            const taggedIds = new Set((tagged || []).map(t => t.telegram_id));
            leads = leads.filter(l => taggedIds.has(l.telegram_id));
          }
          setRecipientCount(leads.length);
        } catch(e) { showToast('Preview failed: ' + e.message, 'error'); }
        finally { setCountLoading(false); }
      };

      const saveCampaign = async (sendNow) => {
        if (!bName.trim()) { showToast('Name required', 'error'); return; }
        if (!bMsgUz.trim() && !bMsgRu.trim()) { showToast('At least one message template required', 'error'); return; }
        setSaving(true);
        try {
          const payload = {
            name: bName.trim(),
            message_uz: bMsgUz.trim(),
            message_ru: bMsgRu.trim(),
            target_filters: buildFilters(),
            status: sendNow ? 'scheduled' : 'draft',
            scheduled_for: sendNow ? (bScheduled || new Date().toISOString()) : (bScheduled || null),
            created_by: localStorage.getItem('crm_user_name') || 'CRM',
          };
          const { error } = await supabase.from('campaigns').insert(payload);
          if (error) throw error;
          showToast(sendNow ? 'Campaign scheduled!' : 'Draft saved!', 'success');
          setBName(''); setBMsgUz(''); setBMsgRu(''); setBStatus(''); setBSource('');
          setBLang(''); setBInactiveDays(''); setBTag(''); setBScheduled(''); setRecipientCount(null);
          setView('list');
          loadCampaigns();
        } catch(e) { showToast('Save failed: ' + e.message, 'error'); }
        finally { setSaving(false); }
      };

      const deleteCampaign = async (id) => {
        if (!confirm('Delete this campaign?')) return;
        await supabase.from('campaigns').delete().eq('id', id);
        loadCampaigns();
      };

      const openDelivery = async (camp) => {
        setSelectedCampaign(camp);
        setDelivLoading(true);
        setView('delivery');
        try {
          const { data } = await supabase.from('campaign_deliveries').select('*').eq('campaign_id', camp.id).order('created_at', { ascending: false });
          setDeliveries(data || []);
        } catch(e) { showToast('Failed to load deliveries', 'error'); }
        finally { setDelivLoading(false); }
      };

      const statusBadge = (s) => {
        const map = { draft: ['#f1f5f9', '#64748b'], scheduled: ['#fef3c7','#d97706'], sending: ['#dbeafe','#2563eb'], sent: ['#dcfce7','#166534'], failed: ['#fee2e2','#b91c1c'] };
        const [bg, color] = map[s] || map.draft;
        return <span style={{ background: bg, color, padding: '2px 8px', borderRadius: 10, fontSize: 11, fontWeight: 600 }}>{s}</span>;
      };

      if (loading) return <div className="center-load"><div className="spinner" /></div>;

      if (view === 'builder') return (
        <div style={{ maxWidth: 700 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 20 }}>
            <button className="btn" onClick={() => setView('list')}>← Back</button>
            <h2 style={{ margin: 0 }}>New Campaign</h2>
          </div>
          <div className="card" style={{ marginBottom: 16 }}>
            <h3 style={{ marginBottom: 12 }}>Campaign Details</h3>
            <label style={{ fontSize: 13, color: '#64748b', display: 'block', marginBottom: 4 }}>Name</label>
            <input value={bName} onChange={e => setBName(e.target.value)} placeholder="e.g. April Re-engagement" style={{ width: '100%', padding: 8, border: '1px solid #e2e8f0', borderRadius: 6, marginBottom: 12, boxSizing: 'border-box' }} />

            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12 }}>
              <div>
                <label style={{ fontSize: 13, color: '#64748b', display: 'block', marginBottom: 4 }}>Message (Uzbek) 🇺🇿</label>
                <textarea value={bMsgUz} onChange={e => setBMsgUz(e.target.value)} rows={5} placeholder="HTML supported: <b>bold</b>" style={{ width: '100%', padding: 8, border: '1px solid #e2e8f0', borderRadius: 6, fontFamily: 'inherit', fontSize: 13, boxSizing: 'border-box' }} />
              </div>
              <div>
                <label style={{ fontSize: 13, color: '#64748b', display: 'block', marginBottom: 4 }}>Message (Russian) 🇷🇺</label>
                <textarea value={bMsgRu} onChange={e => setBMsgRu(e.target.value)} rows={5} placeholder="HTML supported: <b>жирный</b>" style={{ width: '100%', padding: 8, border: '1px solid #e2e8f0', borderRadius: 6, fontFamily: 'inherit', fontSize: 13, boxSizing: 'border-box' }} />
              </div>
            </div>
          </div>

          <div className="card" style={{ marginBottom: 16 }}>
            <h3 style={{ marginBottom: 12 }}>Target Audience</h3>
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12 }}>
              <div>
                <label style={{ fontSize: 13, color: '#64748b', display: 'block', marginBottom: 4 }}>Status filter</label>
                <select value={bStatus} onChange={e => setBStatus(e.target.value)} style={{ width: '100%', padding: 8, border: '1px solid #e2e8f0', borderRadius: 6, background: '#fff' }}>
                  <option value="">All statuses</option>
                  <option value="new">New</option>
                  <option value="contacted">Contacted</option>
                  <option value="qualified">Qualified</option>
                  <option value="proposal_sent">Proposal Sent</option>
                  <option value="won">Won</option>
                  <option value="lost">Lost</option>
                </select>
              </div>
              <div>
                <label style={{ fontSize: 13, color: '#64748b', display: 'block', marginBottom: 4 }}>Language filter</label>
                <select value={bLang} onChange={e => setBLang(e.target.value)} style={{ width: '100%', padding: 8, border: '1px solid #e2e8f0', borderRadius: 6, background: '#fff' }}>
                  <option value="">All languages</option>
                  <option value="uz">Uzbek</option>
                  <option value="ru">Russian</option>
                </select>
              </div>
              <div>
                <label style={{ fontSize: 13, color: '#64748b', display: 'block', marginBottom: 4 }}>Source filter</label>
                <input value={bSource} onChange={e => setBSource(e.target.value)} placeholder="e.g. meta_ads" style={{ width: '100%', padding: 8, border: '1px solid #e2e8f0', borderRadius: 6, boxSizing: 'border-box' }} />
              </div>
              <div>
                <label style={{ fontSize: 13, color: '#64748b', display: 'block', marginBottom: 4 }}>Inactive (days)</label>
                <input type="number" value={bInactiveDays} onChange={e => setBInactiveDays(e.target.value)} placeholder="e.g. 7" style={{ width: '100%', padding: 8, border: '1px solid #e2e8f0', borderRadius: 6, boxSizing: 'border-box' }} />
              </div>
              <div>
                <label style={{ fontSize: 13, color: '#64748b', display: 'block', marginBottom: 4 }}>Has tag</label>
                <input value={bTag} onChange={e => setBTag(e.target.value)} placeholder="e.g. b2b" style={{ width: '100%', padding: 8, border: '1px solid #e2e8f0', borderRadius: 6, boxSizing: 'border-box' }} />
              </div>
              <div>
                <label style={{ fontSize: 13, color: '#64748b', display: 'block', marginBottom: 4 }}>Schedule for (optional)</label>
                <input type="datetime-local" value={bScheduled} onChange={e => setBScheduled(e.target.value)} style={{ width: '100%', padding: 8, border: '1px solid #e2e8f0', borderRadius: 6, boxSizing: 'border-box' }} />
              </div>
            </div>
            <div style={{ marginTop: 16, display: 'flex', alignItems: 'center', gap: 12 }}>
              <button className="btn" onClick={previewCount} disabled={countLoading}>
                {countLoading ? '⏳ Counting...' : '👁 Preview Recipient Count'}
              </button>
              {recipientCount !== null && (
                <span style={{ fontWeight: 700, fontSize: 15, color: recipientCount > 0 ? '#166534' : '#b91c1c' }}>
                  {recipientCount === 0 ? '⚠️ No matching leads' : `✅ ${recipientCount} recipients`}
                </span>
              )}
            </div>
          </div>

          <div style={{ display: 'flex', gap: 12 }}>
            <button className="btn" style={{ flex: 1 }} onClick={() => saveCampaign(false)} disabled={saving}>💾 Save as Draft</button>
            <button className="btn btn-primary" style={{ flex: 1 }} onClick={() => saveCampaign(true)} disabled={saving || recipientCount === 0}>
              {bScheduled ? '📅 Schedule Campaign' : '🚀 Send Now'}
            </button>
          </div>
        </div>
      );

      if (view === 'delivery' && selectedCampaign) return (
        <div style={{ maxWidth: 700 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 20 }}>
            <button className="btn" onClick={() => setView('list')}>← Back</button>
            <h2 style={{ margin: 0 }}>{selectedCampaign.name}</h2>
            {statusBadge(selectedCampaign.status)}
          </div>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3,1fr)', gap: 12, marginBottom: 16 }}>
            {[
              { label: 'Sent', value: selectedCampaign.sent_count || 0, color: '#166534', bg: '#dcfce7' },
              { label: 'Failed', value: selectedCampaign.failed_count || 0, color: '#b91c1c', bg: '#fee2e2' },
              { label: 'Total', value: (selectedCampaign.sent_count || 0) + (selectedCampaign.failed_count || 0), color: '#1e40af', bg: '#dbeafe' },
            ].map(s => (
              <div key={s.label} className="card" style={{ textAlign: 'center', background: s.bg }}>
                <div style={{ fontSize: 28, fontWeight: 700, color: s.color }}>{s.value}</div>
                <div style={{ fontSize: 13, color: s.color, opacity: 0.8 }}>{s.label}</div>
              </div>
            ))}
          </div>
          {delivLoading ? <div className="center-load"><div className="spinner" /></div> : (
            <div className="card">
              <h3 style={{ marginBottom: 12 }}>Delivery Log ({deliveries.length})</h3>
              <div style={{ border: '1px solid #e2e8f0', borderRadius: 6, maxHeight: 400, overflowY: 'auto' }}>
                {deliveries.length === 0 && <div style={{ padding: 16, color: '#64748b' }}>No deliveries recorded yet.</div>}
                {deliveries.map(d => (
                  <div key={d.id} style={{ display: 'flex', gap: 12, padding: '8px 12px', borderBottom: '1px solid #f1f5f9', alignItems: 'center', fontSize: 13 }}>
                    <span style={{ fontFamily: 'monospace', color: '#64748b', minWidth: 80 }}>{d.telegram_id}</span>
                    <span style={{ flex: 1 }}>{d.sent_at ? timeAgo(d.sent_at) : '—'}</span>
                    {d.delivered === true && <span style={{ color: '#166534', fontWeight: 600 }}>✓ Delivered</span>}
                    {d.delivered === false && <span style={{ color: '#b91c1c', fontWeight: 600 }} title={d.failed_reason}>✗ {d.failed_reason || 'Failed'}</span>}
                    {d.delivered === null && <span style={{ color: '#64748b' }}>Pending</span>}

                ))}
              </div>
            </div>
          )}

      // List view
      return (
        <div style={{ maxWidth: 700 }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 20 }}>
            <h2 style={{ margin: 0 }}>📣 Campaigns</h2>
            <button className="btn btn-primary" onClick={() => setView('builder')}>+ New Campaign</button>
          </div>
          {campaigns.length === 0 ? (
            <div className="card" style={{ textAlign: 'center', padding: 40, color: '#64748b' }}>
              <div style={{ fontSize: 40, marginBottom: 12 }}>📣</div>
              <div style={{ fontWeight: 600, marginBottom: 8 }}>No campaigns yet</div>
              <div style={{ fontSize: 13, marginBottom: 16 }}>Re-engage your leads with a targeted message blast.</div>
              <button className="btn btn-primary" onClick={() => setView('builder')}>Create First Campaign</button>
            </div>
          ) : (
            <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
              {campaigns.map(c => (
                <div key={c.id} className="card" style={{ display: 'flex', alignItems: 'center', gap: 16 }}>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontWeight: 600, marginBottom: 4 }}>{c.name}</div>
                    <div style={{ fontSize: 12, color: '#64748b' }}>{timeAgo(c.created_at)} · by {c.created_by || '—'}</div>
                    {c.scheduled_for && <div style={{ fontSize: 12, color: '#64748b' }}>Scheduled: {new Date(c.scheduled_for).toLocaleString()}</div>}
                  </div>
                  <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'flex-end', gap: 6 }}>
                    {statusBadge(c.status)}
                    {(c.sent_count > 0 || c.failed_count > 0) && (
                      <span style={{ fontSize: 12, color: '#64748b' }}>✓{c.sent_count} ✗{c.failed_count}</span>

                  <div style={{ display: 'flex', gap: 6 }}>
                    <button className="btn" style={{ padding: '4px 10px', fontSize: 12 }} onClick={() => openDelivery(c)}>📊 Stats</button>

                      <button className="btn" style={{ padding: '4px 10px', fontSize: 12, color: '#b91c1c' }} onClick={() => deleteCampaign(c.id)}>Delete</button>

                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      );

    // Routing Rules Manager
    function RoutingRulesManager({ showToast }) {
      const [rules, setRules] = useState([]);
      const [ruleName, setRuleName] = useState('');
      const [ruleSourceCond, setRuleSourceCond] = useState('');
      const [ruleStrategy, setRuleStrategy] = useState('round_robin');
      
      const loadRules = useCallback(async () => {
        const { data } = await supabase.from('routing_rules').select('*').order('priority', { ascending: false });
        setRules(data || []);
      }, []);

      useEffect(() => { loadRules(); }, [loadRules]);

      const addRule = async () => {
        if (!ruleName.trim()) { showToast('Name required', 'error'); return; }
        const conditions = ruleSourceCond ? { source: ruleSourceCond.trim() } : {};
        const { error } = await supabase.from('routing_rules').insert({
          name: ruleName.trim(),
          conditions,
          assignee_strategy: ruleStrategy,
          priority: rules.length > 0 ? rules[0].priority + 1 : 1
        });
        if (error) { showToast(error.message, 'error'); return; }
        showToast('Rule added', 'success');
        setRuleName(''); setRuleSourceCond(''); setRuleStrategy('round_robin');
        loadRules();
      };

      const removeRule = async (id) => {
        await supabase.from('routing_rules').delete().eq('id', id);
        loadRules();
      };

      return (
        <div>
          <p style={{ fontSize: 13, color: '#64748b', marginBottom: 12 }}>New leads will be assigned based on these rules (highest priority down).</p>
          {rules.length > 0 ? (
            <div style={{ border: '1px solid #e2e8f0', borderRadius: 6, marginBottom: 12 }}>
              {rules.map(r => (
                <div key={r.id} style={{ display: 'flex', alignItems: 'center', gap: 12, padding: '8px 12px', borderBottom: '1px solid #e2e8f0' }}>
                  <span style={{ fontWeight: 500, flex: 1 }}>{r.name}</span>
                  <span style={{ fontSize: 13, background: '#f5f5f5', padding: '2px 6px', borderRadius: 4 }}>
                    {Object.keys(r.conditions||{}).length ? JSON.stringify(r.conditions) : 'All Sources'}
                  </span>
                  <span style={{ fontSize: 13, background: '#e0e7ff', color: '#3730a3', padding: '2px 6px', borderRadius: 4 }}>
                    {r.assignee_strategy}
                  </span>
                  <button className="btn" style={{ padding: '2px 8px' }} onClick={() => removeRule(r.id)}>✕</button>
                </div>
              ))}
            </div>

    const CRM_TOOLS = [
      {
        type: 'function',
        function: {
          name: 'query_leads',
          description: 'Filter leads from the database. Returns up to 20 matching leads ordered by score desc.',
          parameters: {
            type: 'object',
            properties: {
              status: { type: 'string', description: 'Filter by status: new/contacted/qualified/proposal_sent/won/lost' },
              source: { type: 'string', description: 'Filter by traffic source (e.g. meta_general, organic)' },
              min_score: { type: 'integer', description: 'Minimum lead score (inclusive)' },
              has_phone: { type: 'boolean', description: 'If true, only leads with a phone number' },
              days_old: { type: 'integer', description: 'Only leads created in the last N days' },
            },
            required: [],
          },
        },
      },
      {
        type: 'function',
        function: {
          name: 'find_lead_by_name',
          description: 'Find leads by partial first or last name match.',
          parameters: {
            type: 'object',
            properties: { name: { type: 'string', description: 'Name or partial name to search for' } },
            required: ['name'],
          },
        },
      },
      {
        type: 'function',
        function: {
          name: 'query_conversations',
          description: 'Get the last 20 conversation messages for a specific lead.',
          parameters: {
            type: 'object',
            properties: { telegram_id: { type: 'integer', description: "The lead's Telegram ID" } },
            required: ['telegram_id'],
          },
        },
      },
      {
        type: 'function',
        function: {
          name: 'get_analytics',
          description: 'Get aggregate analytics over all leads.',
          parameters: {
            type: 'object',
            properties: {
              metric: {
                type: 'string',
                enum: ['count_by_status', 'count_by_source', 'avg_score', 'conversion_rate', 'total_count'],
                description: 'Which aggregate metric to compute',
              },
            },
            required: ['metric'],
          },
        },
      },
    ];

    async function executeCrmTool(name, args) {
      try {
        if (name === 'query_leads') {
          let q = supabase.from('leads').select('telegram_id, first_name, last_name, username, phone, status, source, lead_score, created_at, first_contact_at');
          if (args.status) q = q.eq('status', args.status);
          if (args.source) q = q.eq('source', args.source);
          if (args.min_score != null) q = q.gte('lead_score', args.min_score);
          if (args.has_phone) q = q.not('phone', 'is', null);
          if (args.days_old) {
            const since = new Date(Date.now() - args.days_old * 86400000).toISOString();
            q = q.gte('created_at', since);
          }
          const { data } = await q.order('lead_score', { ascending: false }).limit(20);
          return JSON.stringify(data || []);
        }
        if (name === 'find_lead_by_name') {
          const { data } = await supabase.from('leads')
            .select('telegram_id, first_name, last_name, username, phone, status, source, lead_score')
            .or(`first_name.ilike.%${args.name}%,last_name.ilike.%${args.name}%`)
            .limit(10);
          return JSON.stringify(data || []);
        }
        if (name === 'query_conversations') {
          const { data } = await supabase.from('conversations')
            .select('role, message, created_at')
            .eq('telegram_id', args.telegram_id)
            .order('created_at', { ascending: false })
            .limit(20);
          return JSON.stringify((data || []).reverse());
        }
        if (name === 'get_analytics') {
          const { data: leads } = await supabase.from('leads').select('status, source, lead_score, phone');
          const all = leads || [];
          if (args.metric === 'total_count') return JSON.stringify({ total: all.length });
          if (args.metric === 'count_by_status') {
            const counts = {};
            all.forEach(l => { counts[l.status || 'new'] = (counts[l.status || 'new'] || 0) + 1; });
            return JSON.stringify(counts);
          }
          if (args.metric === 'count_by_source') {
            const counts = {};
            all.forEach(l => { counts[l.source || 'organic'] = (counts[l.source || 'organic'] || 0) + 1; });
            return JSON.stringify(Object.fromEntries(Object.entries(counts).sort((a, b) => b[1] - a[1])));
          }
          if (args.metric === 'avg_score') {
            const scores = all.map(l => l.lead_score || 0);
            const avg = scores.length ? Math.round(scores.reduce((a, b) => a + b, 0) / scores.length * 10) / 10 : 0;
            return JSON.stringify({ avg_score: avg, sample_size: all.length });
          }
          if (args.metric === 'conversion_rate') {
            const won = all.filter(l => l.status === 'won').length;
            const rate = all.length ? Math.round(won / all.length * 1000) / 10 : 0;
            return JSON.stringify({ won, total: all.length, conversion_rate_pct: rate });
          }
          return JSON.stringify({ error: 'unknown metric' });
        }
        return JSON.stringify({ error: `unknown tool: ${name}` });
      } catch (e) {
        return JSON.stringify({ error: e.message });
      }
    }

    async function askCrmAI(question, messageHistory) {
      const today = new Date().toISOString().slice(0, 10);
      const systemPrompt = `Ты CRM-аналитик. Сегодня ${today}. Статусы: new/contacted/qualified/proposal_sent/won/lost. Отвечай на русском, кратко и с именами/цифрами.`;
      const messages = [{ role: 'system', content: systemPrompt }, ...messageHistory, { role: 'user', content: question }];

      for (let round = 0; round < 5; round++) {
        // Calls /api/ask (Vercel serverless) — OpenAI key never exposed in browser
        const res = await fetch('/api/ask', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ model: 'gpt-4o-mini', messages, tools: CRM_TOOLS, tool_choice: 'auto' }),
        });
        if (!res.ok) throw new Error(`AI error ${res.status}: ${await res.text()}`);
        const data = await res.json();
        const msg = data.choices[0].message;
        if (!msg.tool_calls || msg.tool_calls.length === 0) return msg.content || 'Нет ответа.';
        messages.push(msg);
        for (const tc of msg.tool_calls) {
          const args = JSON.parse(tc.function.arguments);
          const result = await executeCrmTool(tc.function.name, args);
          messages.push({ role: 'tool', tool_call_id: tc.id, content: result });
        }
      }
      return 'Превышен лимит запросов. Переформулируйте вопрос.';
    }

    function AskAI({ open, onClose }) {
      const [messages, setMessages] = useState([]);

      }, [messages, loading]);

      useEffect(() => {
        if (open && inputRef.current) setTimeout(() => inputRef.current.focus(), 50);
      }, [open]);

      const send = async (text) => {
        const q = text || input.trim();
        if (!q || loading) return;
        setInput('');
        setMessages(prev => [...prev, { role: 'user', content: q }]);
        setLoading(true);
        try {
          const history = messages.slice(-10).map(m => ({ role: m.role, content: m.content }));
          const answer = await askCrmAI(q, history);
          setMessages(prev => [...prev, { role: 'assistant', content: answer }]);

          setMessages(prev => [...prev, { role: 'assistant', content: `❌ Ошибка: ${e.message}` }]);
        } finally {
          setLoading(false);
        }
      };

      const handleKey = e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } };

      return (
        <div className={`ai-panel${open ? ' open' : ''}`}>
          <div className="ai-panel-header">

      );

    function Sources({ showToast, refreshKey }) {
      const [rows, setRows] = useState([]);
      const [loading, setLoading] = useState(true);
      const [attrMode, setAttrMode] = useState('first');

      const load = useCallback(async () => {
        setLoading(true);
        try {
          const { data, error } = await supabase.from('leads')
            .select('source, original_source, touchpoints, status, deal_value, deal_currency');
          if (error) throw error;

          // Aggregate by source
          const map = {};
          (data || []).forEach(l => {
             let sourcesAssigned = [];
             if (attrMode === 'first') {
                sourcesAssigned.push(l.original_source || l.source || 'organic');
             } else if (attrMode === 'last') {
                if (l.touchpoints && l.touchpoints.length > 0) {
                    sourcesAssigned.push(l.touchpoints[l.touchpoints.length - 1].source);
                } else {
                    sourcesAssigned.push(l.source || l.original_source || 'organic');
                }
             } else if (attrMode === 'multi') {
                const multiSources = new Set();
                multiSources.add(l.original_source || l.source || 'organic');
                if (l.touchpoints) {
                    l.touchpoints.forEach(tp => multiSources.add(tp.source));
                }
                sourcesAssigned = Array.from(multiSources);
             }

             const weight = 1.0 / sourcesAssigned.length;

             sourcesAssigned.forEach(src => {
                if (!map[src]) map[src] = { source: src, count: 0, converted: 0, revenue: 0 };
                map[src].count += weight;
                if (l.status === 'won') {
                  map[src].converted += weight;
                  map[src].revenue += (l.deal_value || 0) * weight;
                }
             });
          });

          const result = Object.values(map).sort((a, b) => b.count - a.count);
          setRows(result);
        } catch (e) {
          showToast('Failed to load sources: ' + e.message, 'error');
        } finally {
          setLoading(false);
        }
      }, [showToast, attrMode]);

      useEffect(() => { load(); }, [load, refreshKey]);

      if (loading) return <div className="center-load"><div className="spinner" /></div>;

      const totalLeads = rows.reduce((s, r) => s + r.count, 0);
      const totalRevenue = rows.reduce((s, r) => s + r.revenue, 0);
      const totalConverted = rows.reduce((s, r) => s + r.converted, 0);

      return (
        <div className="content-area" style={{ padding: 24 }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 16 }}>

                 <option value="first">First-Touch (Original)</option>
                 <option value="last">Last-Touch (Recent)</option>
                 <option value="multi">Multi-Touch (Linear)</option>
               </select>
            </div>
          </div>

          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 16, marginBottom: 24 }}>
            {[
              { label: 'Total Leads', value: totalLeads },
              { label: 'Converted', value: totalConverted },
              { label: 'Total Revenue', value: fmtRevenue(totalRevenue, 'UZS') || '0 UZS' },
            ].map(s => (
              <div key={s.label} className="card" style={{ textAlign: 'center' }}>
                <div style={{ fontSize: 24, fontWeight: 700, color: '#3b82f6' }}>{s.value}</div>
                <div style={{ fontSize: 13, color: '#64748b', marginTop: 4 }}>{s.label}</div>
              </div>
            ))}
          </div>

          <div className="card" style={{ padding: 0, overflow: 'hidden' }}>
            <table className="leads-table" style={{ width: '100%' }}>
              <thead>
                <tr>
                  <th style={{ textAlign: 'left', padding: '12px 16px' }}>Source</th>
                  <th style={{ textAlign: 'right', padding: '12px 16px' }}>Leads</th>
                  <th style={{ textAlign: 'right', padding: '12px 16px' }}>Converted</th>
                  <th style={{ textAlign: 'right', padding: '12px 16px' }}>Conv. Rate</th>
                  <th style={{ textAlign: 'right', padding: '12px 16px' }}>Revenue (UZS)</th>
                  <th style={{ textAlign: 'right', padding: '12px 16px' }}>Avg Deal</th>
                </tr>
              </thead>
              <tbody>
                {rows.map(r => {
                  const rate = r.count ? ((r.converted / r.count) * 100).toFixed(1) : '0.0';
                  const avg = r.converted ? fmtRevenue(r.revenue / r.converted, 'UZS') : '—';
                  return (
                    <tr key={r.source}>
                      <td style={{ padding: '10px 16px', fontWeight: 500 }}>{r.source}</td>
                      <td style={{ padding: '10px 16px', textAlign: 'right' }}>{r.count}</td>
                      <td style={{ padding: '10px 16px', textAlign: 'right' }}>{r.converted}</td>

                      <td style={{ padding: '10px 16px', textAlign: 'right' }}>
                        {r.revenue > 0 ? fmtRevenue(r.revenue, 'UZS') : '—'}
                      </td>
                      <td style={{ padding: '10px 16px', textAlign: 'right', color: '#64748b' }}>{avg}</td>

    function AnalyticsDashboard({ showToast }) {
      const [loading, setLoading] = useState(true);
      const [members, setMembers] = useState([]);
      const [leads, setLeads] = useState([]);
      const [heatmapData, setHeatmapData] = useState({ starts: [], phones: [], conversions: [] });
      const [heatmapType, setHeatmapType] = useState('starts');

      const load = useCallback(async () => {
        setLoading(true);
        try {
          const [mRes, lRes, eRes, hRes] = await Promise.all([
            supabase.from('team_members').select('*'),
            supabase.from('leads').select('*'),
            supabase.from('events').select('created_at').eq('event_type', 'bot_start'),
            supabase.from('status_history').select('created_at').eq('new_status', 'won')
          ]);
          setMembers(mRes.data || []);
          setLeads(lRes.data || []);
          
          const starts = eRes.data || [];
          const phones = (lRes.data || []).filter(l => l.phone).map(l => ({ created_at: l.updated_at || l.created_at }));
          const conversions = hRes.data || [];

          setHeatmapData({ starts, phones, conversions });
        } catch(e) {
          showToast('Analytics error: ' + e.message, 'error');
        } finally {
          setLoading(false);
        }
      }, [showToast]);

      useEffect(() => { load(); }, [load]);

      if (loading) return <div className="center-load"><div className="spinner" /></div>;

      const activeEvents = heatmapData[heatmapType] || [];
      const grid = Array.from({length: 7}, () => Array(24).fill(0));
      let maxVal = 0;
      activeEvents.forEach(ev => {
         const d = new Date(ev.created_at);
         const day = d.getDay();
         const hour = d.getHours();
         grid[day][hour]++;
         if (grid[day][hour] > maxVal) maxVal = grid[day][hour];
      });

      const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];

      const lb = members.map(m => {
         const assigned = leads.filter(l => l.assigned_to === m.name);
         const won = assigned.filter(l => l.status === 'won');
         const revenue = won.reduce((sum, l) => sum + (l.deal_value || 0), 0);
         return { ...m, assigned: assigned.length, won: won.length, revenue };
      }).sort((a, b) => b.revenue - a.revenue);

      return (
        <div style={{ maxWidth: 800 }}>
          <div className="card" style={{ marginBottom: 16 }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 16 }}>
              <h3 style={{ margin: 0 }}>Activity Heatmap</h3>
              <select value={heatmapType} onChange={e => setHeatmapType(e.target.value)} style={{ padding: '6px 8px', borderRadius: 6, border: '1px solid #e2e8f0', outline: 'none' }}>
                <option value="starts">First Contact (Starts)</option>
                <option value="phones">Phone Shared</option>
                <option value="conversions">Conversions (Won)</option>
              </select>
            </div>
            <div style={{ display: 'flex', gap: 4 }}>
               <div style={{ display: 'flex', flexDirection: 'column', gap: 2, marginRight: 8, marginTop: 24 }}>
                 {days.map(d => <div key={d} style={{ height: 24, fontSize: 11, color: '#64748b', display: 'flex', alignItems: 'center' }}>{d}</div>)}
               </div>
               <div style={{ flex: 1, display: 'flex', flexDirection: 'column', gap: 2 }}>
                 <div style={{ display: 'flex', gap: 2, height: 20 }}>
                   {Array.from({length: 24}).map((_, h) => <div key={h} style={{ flex: 1, fontSize: 10, color: '#64748b', textAlign: 'center' }}>{h.toString().padStart(2, '0')}</div>)}
                 </div>
                 {grid.map((row, dayIdx) => (
                   <div key={dayIdx} style={{ display: 'flex', gap: 2 }}>
                     {row.map((val, h) => {
                       const intensity = maxVal === 0 ? 0 : val / maxVal;
                       const bg = maxVal === 0 ? '#f1f5f9' : `rgba(16, 185, 129, ${Math.max(0.05, intensity)})`;
                       return <div key={h} style={{ flex: 1, height: 24, backgroundColor: bg, borderRadius: 2 }} title={`${days[dayIdx]} ${h}:00 — ${val} events`} />
                     })}
                   </div>
                 ))}
               </div>
            </div>
          </div>

          <div className="card">
            <h3 style={{ marginBottom: 12 }}>Team Leaderboard</h3>
            <div style={{ border: '1px solid #e2e8f0', borderRadius: 8, overflow: 'hidden' }}>
              <table style={{ width: '100%', borderCollapse: 'collapse', textAlign: 'left', fontSize: 14 }}>
                <thead style={{ background: '#f8fafc' }}>
                  <tr>
                    <th style={{ padding: '10px 16px', borderBottom: '1px solid #e2e8f0' }}>Agent</th>
                    <th style={{ padding: '10px 16px', borderBottom: '1px solid #e2e8f0' }}>Assigned</th>
                    <th style={{ padding: '10px 16px', borderBottom: '1px solid #e2e8f0' }}>Won</th>
                    <th style={{ padding: '10px 16px', borderBottom: '1px solid #e2e8f0' }}>Conversion %</th>
                    <th style={{ padding: '10px 16px', borderBottom: '1px solid #e2e8f0' }}>Generated Revenue</th>
                  </tr>
                </thead>
                <tbody>
                  {lb.map(m => {
                    const convRate = m.assigned > 0 ? Math.round((m.won / m.assigned) * 100) : 0;
                    return (
                      <tr key={m.id} style={{ borderBottom: '1px solid #f1f5f9' }}>
                        <td style={{ padding: '10px 16px', fontWeight: 500 }}>{m.name}</td>
                        <td style={{ padding: '10px 16px' }}>{m.assigned}</td>
                        <td style={{ padding: '10px 16px' }}>{m.won}</td>
                        <td style={{ padding: '10px 16px' }}>
                          <span style={{ background: convRate > 10 ? '#dcfce7' : '#f1f5f9', color: convRate > 10 ? '#166534' : '#64748b', padding: '2px 6px', borderRadius: 4, fontWeight: 500 }}>
                            {convRate}%
                          </span>
                        </td>
                        <td style={{ padding: '10px 16px', fontWeight: 600, color: '#0f172a' }}>{fmtRevenue(m.revenue, 'UZS')}</td>
                      </tr>
                    )
                  })}
                </tbody>
              </table>
              {lb.length === 0 && <div style={{ padding: 16, color: '#64748b' }}>No agents mapped yet.</div>}
            </div>
          </div>
        </div>
      );
    }

    function App() {
      const [authed, setAuthed] = useState(sessionStorage.getItem('crm_auth') === '1');
      const [tab, setTab] = useState('dashboard');
      const [search, setSearch] = useState('');
      const [debouncedSearch, setDebouncedSearch] = useState('');
      const [selectedLead, setSelectedLead] = useState(null);
      const [refreshKey, setRefreshKey] = useState(0);
      const [newLeadsCount, setNewLeadsCount] = useState(0);
      const [showAI, setShowAI] = useState(false);
      const [toastEl, showToast] = useToast();

      useEffect(() => {
        const t = setTimeout(() => setDebouncedSearch(search), 300);
        return () => clearTimeout(t);
      }, [search]);

      useEffect(() => {
        if (!authed) return;
        (async () => {
          try {
            const since = new Date(Date.now() - 24 * 3600 * 1000).toISOString();
            const { count } = await supabase.from('leads').select('*', { count: 'exact', head: true }).gte('created_at', since);
            setNewLeadsCount(count || 0);
          } catch { }
        })();
      }, [authed, refreshKey]);

      if (!authed) return <Login onSuccess={() => setAuthed(true)} />;

      return (
        <div className="app">
          <div className="sidebar">
            <div className="logo">⚡ Lead CRM</div>
            <div className="nav">
              <a className={tab === 'dashboard' ? 'active' : ''} onClick={() => setTab('dashboard')}>📊 Dashboard</a>
              <a className={tab === 'leads' ? 'active' : ''} onClick={() => setTab('leads')}>👥 Leads</a>
              <a className={tab === 'pipeline' ? 'active' : ''} onClick={() => setTab('pipeline')}>🎯 Pipeline</a>
              <a className={tab === 'analytics' ? 'active' : ''} onClick={() => setTab('analytics')}>📈 Analytics</a>
              <a className={tab === 'campaigns' ? 'active' : ''} onClick={() => setTab('campaigns')}>📣 Campaigns</a>
              <a className={tab === 'sources' ? 'active' : ''} onClick={() => setTab('sources')}>📡 Sources ROI</a>
              <a className={tab === 'settings' ? 'active' : ''} onClick={() => setTab('settings')}>⚙️ Settings</a>
            </div>
          </div>

          <div className="main">
            <div className="topbar">
              <input
                className="search"
                placeholder="Search leads by name, username, or phone..."
                value={search}
                onChange={e => setSearch(e.target.value)}
              />
              <div className="topbar-right">
                {newLeadsCount > 0 && <span className="badge-new">{newLeadsCount} new</span>}
                <button className="ai-toggle-btn" onClick={() => setShowAI(s => !s)}>🤖 Ask AI</button>
                <button className="btn" onClick={() => setRefreshKey(k => k + 1)}>🔄 Refresh</button>
                <button className="btn" onClick={() => { sessionStorage.removeItem('crm_auth'); location.reload(); }}>Logout</button>
              </div>
            </div>

            <div className="content">
              {tab === 'dashboard' && <Dashboard showToast={showToast} refreshKey={refreshKey} />}
              {tab === 'leads' && <LeadsTable showToast={showToast} refreshKey={refreshKey} search={debouncedSearch} onOpenLead={setSelectedLead} />}
              {tab === 'pipeline' && <Kanban showToast={showToast} refreshKey={refreshKey} onOpenLead={setSelectedLead} />}
              {tab === 'analytics' && <AnalyticsDashboard showToast={showToast} />}
              {tab === 'campaigns' && <CampaignsTab showToast={showToast} />}
              {tab === 'sources' && <Sources showToast={showToast} refreshKey={refreshKey} />}
              {tab === 'settings' && <Settings showToast={showToast} />}
            </div>
          </div>

          {selectedLead && (
            <LeadPanel
              lead={selectedLead}
              onClose={() => setSelectedLead(null)}
              showToast={showToast}
              onUpdated={() => setRefreshKey(k => k + 1)}
            />
          )}
          <AskAI open={showAI} onClose={() => setShowAI(false)} />
          {toastEl}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>

</html>
